<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1F1B17" />
<title>Routines — Workout Journal</title>
<style>
  :root {
    --bg: #F1EBDF; --surface: #F8F4EC; --surface-alt: #E8E0D0;
    --border: #DBD2BF; --border-soft: #E6DCC7;
    --text: #2D2A26; --text-2: #6B6660; --muted: #A39E97;
    --accent: #FF7A55; --accent-soft: #FFE9DF; --accent-2: #5DAA80;
    --warn: #E8A957; --danger: #DC6E6E; --gold: #F2B340;
    --header-bg: #1F1B17; --header-text: #F1EBDF; --header-text-2: #B0A89A;
    --header-border: #2F2A24;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    padding-bottom: 60px; }
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--header-bg); color: var(--header-text);
    padding: 16px max(20px, env(safe-area-inset-right)) 16px max(20px, env(safe-area-inset-left));
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--header-border);
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo .dot { color: var(--accent); }
  a.back {
    color: var(--header-text-2); text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 6px 12px; border: 1px solid var(--header-border); border-radius: 8px;
  }
  a.back:hover { color: var(--header-text); border-color: var(--accent); }
  main { max-width: 720px; margin: 0 auto; padding: 22px 20px; }
  h1 { margin: 0 0 4px; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .subtle { color: var(--text-2); font-size: 14px; margin: 0 0 22px; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; color: var(--text-2); }
  button {
    background: var(--accent); color: white; border: none;
    padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  button:hover { transform: translateY(-1px); }
  button.secondary { background: var(--surface-alt); color: var(--text); }
  button.danger { background: var(--danger); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text-2); }
  .routine-card {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
  }
  .routine-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    margin-bottom: 8px;
  }
  .routine-name { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .routine-cat {
    background: var(--accent-soft); color: var(--accent);
    padding: 3px 10px; border-radius: 999px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .routine-meta { color: var(--text-2); font-size: 13px; margin: 8px 0; }
  .routine-exercises {
    display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0;
  }
  .ex-tag {
    background: var(--surface-alt);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  .ex-tag.metcon { background: var(--accent-2-soft); color: var(--accent-2); }
  .day-pills {
    display: flex; gap: 4px; margin: 12px 0 6px;
  }
  .day-pill-btn {
    background: var(--surface-alt); color: var(--text-2);
    border: none; padding: 6px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.3px; font-family: inherit;
  }
  .day-pill-btn.on { background: var(--gold); color: white; }
  .routine-actions {
    display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap;
  }
  .routine-actions button { padding: 7px 14px; font-size: 12px; }
  .empty {
    background: var(--surface); border: 2px dashed var(--border);
    border-radius: var(--radius); padding: 40px 20px;
    text-align: center; color: var(--text-2); font-size: 14px;
  }
  .empty p { margin: 6px 0; }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(45,42,38,0.45);
    display: none; align-items: center; justify-content: center; z-index: 100;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal-card {
    background: var(--surface); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto;
  }
  .modal-card h2 { margin: 0 0 16px; font-size: 18px; }
  label { display: block; font-size: 11px; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700;
    margin: 12px 0 4px; }
  input, select, textarea {
    width: 100%; background: var(--surface-alt); border: 1.5px solid transparent;
    color: var(--text); padding: 10px 12px; border-radius: 10px;
    font-size: 15px; font-family: inherit; font-weight: 600;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; }
  .ex-input-row {
    display: grid; grid-template-columns: 1fr 60px 28px;
    gap: 6px; margin-bottom: 6px; align-items: center;
  }
  .ex-input-row input[type=number] { text-align: center; padding: 8px; }
  .ex-input-row button { background: transparent; color: var(--danger); border: none; cursor: pointer; padding: 0; font-size: 16px; }
  .add-ex-btn {
    width: 100%; background: var(--surface-alt); color: var(--text-2);
    border: 1px dashed var(--border); padding: 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 700; margin-top: 4px;
  }

  /* Picker modal: bottom-sheet style + proper chips */
  #pickerBg .modal-card {
    max-width: 560px;
    height: 80vh;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }
  #pickerBg h2 { margin: 0 0 14px; }
  #pickerBg #pickerSearch {
    width: 100%;
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    margin-bottom: 10px;
  }
  #pickerBg #pickerSearch:focus { outline: none; border-color: var(--accent); background: white; }
  #pickerChips {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 0 6px;
    margin: 0 0 8px;
    flex-shrink: 0;
    flex-wrap: nowrap !important;
  }
  #pickerChips .chip {
    background: var(--surface-alt) !important;
    border: none !important;
    color: var(--text-2) !important;
    padding: 7px 14px !important;
    border-radius: 999px !important;
    font-size: 12px !important;
    font-weight: 700 !important;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.3px;
    font-family: inherit;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #pickerChips .chip.active {
    background: var(--text) !important;
    color: var(--bg) !important;
  }
  #pickerList {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    overflow-y: auto;
    flex: 1;
    margin: 0;
    padding: 0;
  }
  #pickerList > div { padding: 13px 16px !important; border-bottom: 1px solid var(--border-soft); }
  #pickerList > div:last-child { border-bottom: none; }
  #pickerList > div:hover { background: var(--surface-alt); }
</style>
</head>
<body>

<header>
  <div class="logo">Journal<span class="dot">.</span> — Routines</div>
  <a class="back" href="/">← journal</a>
</header>

<main>
  <h1>Routines</h1>
  <p class="subtle">Save workout templates and apply them to any day. Schedule them to auto-suggest on certain weekdays.</p>

  <div class="section-header">
    <div class="section-title">Saved Routines</div>
    <button onclick="openCreate()">+ New Routine</button>
  </div>

  <div id="content"></div>
</main>

<!-- Create/Edit modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target.id==='modalBg') closeModal()">
  <div class="modal-card">
    <h2 id="mTitle">New Routine</h2>
    <form onsubmit="event.preventDefault(); submitRoutine();">
      <label>Routine name</label>
      <input type="text" id="mName" placeholder="Heavy Chest Day" required />
      <label>Default category</label>
      <select id="mCategory">
        <option value="">— No default —</option>
        <option>Chest/Tri</option>
        <option>Back/Bi</option>
        <option>Shoulders</option>
        <option>Abs</option>
        <option>Legs</option>
      </select>
      <label>AM exercises</label>
      <div id="mAmList"></div>
      <button type="button" class="add-ex-btn" onclick="addExRow('am')">+ Add exercise</button>
      <label>PM metcon movements</label>
      <div id="mMetconList"></div>
      <button type="button" class="add-ex-btn" onclick="addExRow('metcon')">+ Add movement</button>
      <div class="modal-actions">
        <button type="button" class="secondary" onclick="closeModal()">Cancel</button>
        <button type="submit">Save Routine</button>
      </div>
    </form>
  </div>
</div>

<!-- Apply to date modal -->
<div class="modal-bg" id="applyBg" onclick="if(event.target.id==='applyBg') closeApply()">
  <div class="modal-card">
    <h2>Apply Routine</h2>
    <p class="subtle" id="applyDesc">Pick a date to fill with this routine's exercises.</p>
    <label>Date</label>
    <input type="date" id="applyDate" />
    <div class="modal-actions">
      <button class="secondary" onclick="closeApply()">Cancel</button>
      <button onclick="confirmApply()">Apply</button>
    </div>
  </div>
</div>

<!-- Pool picker modal (for selecting an exercise from the pool) -->
<div class="modal-bg" id="pickerBg" onclick="if(event.target.id==='pickerBg') closePicker()">
  <div class="modal-card">
    <h2 id="pickerTitle">Pick an Exercise</h2>
    <input type="text" id="pickerSearch" placeholder="Search..." oninput="filterPicker()" />
    <div id="pickerChips"></div>
    <div id="pickerList"></div>
    <div class="modal-actions" style="margin-top:14px;">
      <button class="secondary" onclick="closePicker()" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<script>
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Exercise pool (same as pool.html — kept in sync)
const POOL = {
  "Chest/Tri": {
    am: ["Machine Chest Press","Cable Chest Press","Incline DB Press","Flat DB Press","Decline DB Press","DB Chest Fly","Cable Fly (High)","Cable Fly (Mid)","Cable Fly (Low)","Pec Deck Machine","Single-Arm DB Press","Tricep Pushdown (Bar)","Tricep Pushdown (Rope)","Overhead Cable Tricep Extension","DB Skull Crushers","DB Tricep Kickback","Overhead DB Tricep Extension","Single-Arm DB Tricep Extension","Tate Press","Close-Grip DB Press","JM Press (DB)","Cable Single-Arm Pushdown"],
    pm: ["Standard Pushups","Diamond Pushups","Wide Pushups","Decline Pushups","Incline Pushups","Archer Pushups","Hindu Pushups","Pseudo Planche Pushups","Plyo Pushups","Clap Pushups","Spider-Man Pushups","T-Pushups","Parallel Bar Dips","Ring Dips","Bench Dips","Burpees","Tricep Pushdown Burnout","Pike Pushups (tri bias)","Pushup-to-Plank Taps","Explosive Pushups (off blocks)"]
  },
  "Back/Bi": {
    am: ["Lat Pulldown (Wide)","Lat Pulldown (Close-Grip)","Lat Pulldown (Neutral)","Cable Row (High)","Cable Row (Mid)","Cable Row (Low)","Single-Arm Cable Row","Machine Row (Iso)","T-Bar Row (Machine)","DB One-Arm Row","Chest-Supported DB Row","DB High Pull","Reverse Pec Deck","Face Pulls","Straight-Arm Pulldown","DB Shrugs","Cable Shrugs","DB Curls","Hammer Curls","Concentration Curls","Preacher Curl Machine","Cable Curls (Bar)","Cable Curls (Rope)","Incline DB Curls","Spider Curls","21s","Drag Curls","Cross-Body Hammer Curls","Zottman Curls"],
    pm: ["Pull-ups","Chin-ups","Neutral-Grip Pull-ups","Inverted Rows (TRX)","Inverted Rows (Bar)","Pushup Rows (Renegade)","Scapula Pulls","Dead Hangs","Chin Hold Isometric","Australian Pull-ups","Towel Rows","DB Curl Burnout","Hammer Curl Burnout","Cable Curl 21s","Band Pull-aparts","Face Pull Burnout"]
  },
  "Shoulders": {
    am: ["Machine Shoulder Press","Seated DB Shoulder Press","Standing DB Press","Arnold Press","Single-Arm DB Press","DB Lateral Raise","Cable Lateral Raise","Machine Lateral Raise","DB Front Raise","Cable Front Raise","Plate Front Raise","DB Rear Delt Fly","Reverse Pec Deck","Cable Rear Delt Cross","Face Pulls","Cable Y-Raise","Cable W-Raise","DB Shrugs","Cuban Press","Around-the-Worlds","Bottoms-Up DB Press","DB Z-Press"],
    pm: ["Pike Pushups","Decline Pike Pushups","Wall Walks","Wall Handstand Hold","Plank Shoulder Taps","Lateral Raise Burnout","Bear Crawls","Crab Walks","Plank-to-Down-Dog","Plate Shoulder Circles","Shoulder Tap Pushups","Pushup-to-Pike","Cable Lateral Iso Hold"]
  },
  "Abs": {
    am: ["Cable Crunches","Weighted Decline Situps","Ab Wheel Rollouts","Hanging Leg Raises","Hanging Knee Raises","Captain's Chair Leg Raises","Russian Twists (Weighted)","Plank w/ Plate","Side Plank w/ Weight","Bird Dog","DB Side Bends","Pallof Press (Cable)","Cable Wood Chops","Standing Cable Crunch","Stir-the-Pot","Weighted V-Ups"],
    pm: ["V-Ups","Hollow Holds","Hollow Rocks","Bicycle Crunches","Mountain Climbers","Plank","Side Plank","RKC Plank","Toes-to-Bar","Knees-to-Elbows","Dragon Flags","Windshield Wipers","L-Sit Hold","Russian Twists (BW)","Reverse Crunches","Flutter Kicks","Scissor Kicks","Plank Up-Downs","Cross-Body Mountain Climbers"]
  },
  "Legs": {
    am: ["Leg Press","Leg Curls (Seated)","Leg Curls (Lying)","Leg Extensions","Hack Squat Machine","DB Goblet Squat","DB Walking Lunges","DB Reverse Lunges","DB Step-Ups","Bulgarian Split Squat (DB)","DB Sumo Squat","DB Romanian Deadlift","DB Single-Leg RDL","Hip Thrust (Machine)","DB Hip Thrust","Glute Kickback Machine","Cable Kickbacks","Hip Abduction Machine","Hip Adduction Machine","Standing Calf Raise (DB)","Seated Calf Raise (Machine)","Single-Leg Calf Raise (DB)"],
    pm: ["Bulgarian Split Squat Jumps","Box Jumps","Broad Jumps","Jump Squats","Tuck Jumps","Lateral Box Jumps","Lateral Bounds","Skater Jumps","Single-Leg Hops","Walking Lunges (BW)","Reverse Lunges (BW)","Cossack Squats","Sissy Squats","Bulgarian Split Squats (BW)","Wall Sits","Pistol Squat Progressions","Step-Ups (BW)","Calf Raise Burnout"]
  },
  "Universal": {
    am: [],
    pm: ["Box Jumps","Ball Slams","Broad Jumps","Burpees","Mountain Climbers","Battle Ropes","Rowing Erg Sprint","Assault Bike Sprint","Jump Rope (singles)","Jump Rope (double-unders)","Bear Crawls","Crab Walks","Farmer Carry","Sled Push","Sled Pull","Devil Press","Thruster (DB)"]
  }
};
const CATEGORIES = ["Chest/Tri","Back/Bi","Shoulders","Abs","Legs","Universal"];
let CUSTOM = [];

function getAllExercises(phaseFilter) {
  const out = [];
  CATEGORIES.forEach(cat => {
    POOL[cat][phaseFilter].forEach(n => out.push({ name: n, category: cat }));
  });
  CUSTOM.filter(c => c.phase === phaseFilter).forEach(c => out.push({ name: c.name, category: c.category }));
  // De-dupe
  const seen = new Set();
  return out.filter(e => { if (seen.has(e.name)) return false; seen.add(e.name); return true; });
}

let routines = [];
let currentUser = null;
let editingId = null;
let applyingRoutine = null;
let pickerContext = null; // {kind: 'am'|'metcon'} when picker is open
let pickerCategory = 'all';

async function init() {
  const r = await fetch('/api/me');
  const { user } = await r.json();
  if (!user) { location.href = '/login.html'; return; }
  currentUser = user;
  // Load custom exercises so the picker includes them
  try {
    const cr = await fetch('/api/custom-exercises');
    if (cr.ok) {
      const { exercises } = await cr.json();
      CUSTOM = exercises || [];
    }
  } catch {}
  await loadRoutines();
}

async function loadRoutines() {
  const r = await fetch('/api/routines');
  const data = await r.json();
  routines = data.routines || [];
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const c = document.getElementById('content');
  if (!routines.length) {
    c.innerHTML = `<div class="empty">
      <p style="font-size:16px; color:var(--text); font-weight:700;">No routines yet</p>
      <p>Tap "New Routine" to save your first workout template.</p>
      <p style="margin-top:14px"><em>Tip: log a workout you like in the main app, then come back here and re-create it as a routine to reuse it weekly.</em></p>
    </div>`;
    return;
  }
  c.innerHTML = routines.map(r => `
    <div class="routine-card">
      <div class="routine-head">
        <div>
          <div class="routine-name">${escapeHtml(r.name)}</div>
          ${r.category ? `<div class="routine-cat" style="margin-top:6px; display:inline-block">${r.category}</div>` : ''}
        </div>
      </div>
      <div class="routine-exercises">
        ${(r.am_exercises || []).map(e => `<span class="ex-tag">${escapeHtml(e.name)}${e.sets ? ' · ' + e.sets + 'sets' : ''}</span>`).join('')}
        ${(r.metcon_exercises || []).map(e => `<span class="ex-tag metcon">${escapeHtml(e.name)}${e.reps ? ' · ' + e.reps : ''}</span>`).join('')}
      </div>
      <div class="day-pills" title="Tap a day to schedule this routine for it">
        ${DAY_NAMES.map((n, i) => {
          const on = (r.scheduledDays || []).includes(i);
          return `<button class="day-pill-btn ${on?'on':''}" onclick="toggleSchedule(${r.id}, ${i})">${n}</button>`;
        }).join('')}
      </div>
      <div class="routine-meta" style="font-size:11px; margin-top:6px;">Tap a day to schedule this routine on it. Only one routine per day.</div>
      <div class="routine-actions">
        <button onclick="applyRoutineFlow(${r.id})">Apply to date</button>
        <button class="secondary" onclick="openEdit(${r.id})">Edit</button>
        <button class="ghost" onclick="deleteRoutine(${r.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

// ===== Create/Edit =====
function openCreate() {
  editingId = null;
  document.getElementById('mTitle').textContent = 'New Routine';
  document.getElementById('mName').value = '';
  document.getElementById('mCategory').value = '';
  document.getElementById('mAmList').innerHTML = '';
  document.getElementById('mMetconList').innerHTML = '';
  document.getElementById('modalBg').classList.add('show');
}
function openEdit(id) {
  const r = routines.find(x => x.id === id);
  editingId = id;
  document.getElementById('mTitle').textContent = 'Edit Routine';
  document.getElementById('mName').value = r.name;
  document.getElementById('mCategory').value = r.category || '';
  document.getElementById('mAmList').innerHTML = '';
  document.getElementById('mMetconList').innerHTML = '';
  (r.am_exercises || []).forEach(e => addExRow('am', e));
  (r.metcon_exercises || []).forEach(e => addExRow('metcon', e));
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }

function addExRow(kind, prefill = {}) {
  // If no prefill, open the picker. Otherwise add the row directly (used during loadEdit).
  if (!prefill.name) {
    openPicker(kind);
    return;
  }
  const c = document.getElementById(kind === 'am' ? 'mAmList' : 'mMetconList');
  const numLabel = kind === 'am' ? 'sets' : 'reps';
  const numField = kind === 'am' ? 'sets' : 'reps';
  const defaultNum = kind === 'am' ? 3 : 10;
  const div = document.createElement('div');
  div.className = 'ex-input-row';
  div.innerHTML = `
    <input type="text" value="${escapeHtml(prefill.name)}" data-field="name" readonly style="cursor:default; font-weight:600;" />
    <input type="number" placeholder="${numLabel}" value="${prefill[numField] ?? defaultNum}" data-field="${numField}" />
    <button type="button" onclick="this.parentNode.remove()" title="Remove">✕</button>
  `;
  c.appendChild(div);
}

// ===== Pool picker =====
function openPicker(kind) {
  pickerContext = { kind };
  pickerCategory = 'all';
  document.getElementById('pickerTitle').textContent = kind === 'am' ? 'Pick AM Exercise' : 'Pick Metcon Movement';
  document.getElementById('pickerSearch').value = '';
  const chips = ['<button type="button" class="chip active" data-pcat="all" onclick="setPickerCat(\'all\')">All</button>'];
  CATEGORIES.forEach(c => chips.push(`<button type="button" class="chip" data-pcat="${c}" onclick="setPickerCat('${c}')">${c}</button>`));
  document.getElementById('pickerChips').innerHTML = chips.join('');
  renderPickerList();
  document.getElementById('pickerBg').classList.add('show');
  setTimeout(() => document.getElementById('pickerSearch').focus(), 100);
}
function closePicker() {
  document.getElementById('pickerBg').classList.remove('show');
  pickerContext = null;
}
function setPickerCat(c) {
  pickerCategory = c;
  document.querySelectorAll('#pickerChips .chip').forEach(b => b.classList.toggle('active', b.dataset.pcat === c));
  renderPickerList();
}
function filterPicker() { renderPickerList(); }
function renderPickerList() {
  if (!pickerContext) return;
  const q = document.getElementById('pickerSearch').value.toLowerCase().trim();
  const exercises = getAllExercises(pickerContext.kind === 'am' ? 'am' : 'pm');
  const filtered = exercises.filter(e => {
    if (pickerCategory !== 'all' && e.category !== pickerCategory) return false;
    if (q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => a.name.localeCompare(b.name));
  const list = document.getElementById('pickerList');
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-2);padding:30px;">No matches</div>';
    return;
  }
  list.innerHTML = filtered.map(e => `
    <div onclick='pickExercise(${JSON.stringify(e.name)})' style="padding:12px 14px;border-bottom:1px solid var(--border-soft);cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text);">${escapeHtml(e.name)}</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:2px;">${e.category}</div>
      </div>
      <div style="color:var(--accent);font-size:20px;font-weight:700;">+</div>
    </div>
  `).join('');
}
function pickExercise(name) {
  if (!pickerContext) return;
  const kind = pickerContext.kind;
  closePicker();
  // Add the row with the picked name pre-filled
  addExRow(kind, { name });
  // Focus the number input we just added
  setTimeout(() => {
    const container = document.getElementById(kind === 'am' ? 'mAmList' : 'mMetconList');
    const lastRow = container.lastElementChild;
    if (lastRow) lastRow.querySelector('input[type=number]')?.focus();
  }, 50);
}

async function submitRoutine() {
  const name = document.getElementById('mName').value.trim();
  const category = document.getElementById('mCategory').value;
  const am_exercises = collectRows('mAmList', 'sets');
  const metcon_exercises = collectRows('mMetconList', 'reps');
  if (!name) return alert('Name required');
  const body = { name, category: category || null, am_exercises, metcon_exercises };
  const url = editingId ? `/api/routines/${editingId}` : '/api/routines';
  const method = editingId ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) { const { error } = await r.json(); return alert('Failed: ' + error); }
  closeModal();
  await loadRoutines();
}
function collectRows(containerId, numField) {
  const rows = document.querySelectorAll(`#${containerId} .ex-input-row`);
  const out = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const nameInput = Array.from(inputs).find(i => i.dataset.field === 'name');
    const numInput = Array.from(inputs).find(i => i.dataset.field === numField);
    const name = nameInput?.value.trim();
    if (!name) return;
    const item = { name };
    if (numInput?.value) item[numField] = parseInt(numInput.value);
    out.push(item);
  });
  return out;
}

async function deleteRoutine(id) {
  const r = routines.find(x => x.id === id);
  if (!confirm(`Delete "${r.name}"? This also removes any day-of-week schedules for it.`)) return;
  const res = await fetch(`/api/routines/${id}`, { method: 'DELETE' });
  if (!res.ok) return alert('Delete failed');
  await loadRoutines();
}

// ===== Scheduling =====
async function toggleSchedule(routineId, dayOfWeek) {
  // Find if any routine is currently scheduled for this day
  const currentRoutineForDay = routines.find(r => (r.scheduledDays || []).includes(dayOfWeek));
  if (currentRoutineForDay && currentRoutineForDay.id === routineId) {
    // Unschedule
    await fetch(`/api/routine-schedules?day=${dayOfWeek}`, { method: 'DELETE' });
  } else {
    // Schedule (replaces any existing one for this day)
    await fetch('/api/routine-schedules', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ day_of_week: dayOfWeek, routine_id: routineId }),
    });
  }
  await loadRoutines();
}

// ===== Apply to date =====
function applyRoutineFlow(id) {
  applyingRoutine = routines.find(x => x.id === id);
  document.getElementById('applyDesc').textContent = `Pick a date to fill with "${applyingRoutine.name}".`;
  document.getElementById('applyDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('applyBg').classList.add('show');
}
function closeApply() { document.getElementById('applyBg').classList.remove('show'); applyingRoutine = null; }

async function confirmApply() {
  const date = document.getElementById('applyDate').value;
  if (!date || !applyingRoutine) return;
  // Fetch existing workout for that date (if any)
  let existing = null;
  try {
    const r = await fetch(`/api/workouts/${date}`);
    if (r.ok) existing = await r.json();
  } catch {}
  if (existing && (existing.am?.exercises?.length || existing.metcon?.exercises?.length)) {
    if (!confirm(`Workout already exists for ${date}. Replace it with "${applyingRoutine.name}"?`)) return;
  }
  // Build workout from routine
  const workout = {
    date,
    category: applyingRoutine.category || (existing?.category || 'Abs'),
    bodyWeight: existing?.bodyWeight ?? null,
    am: {
      exercises: (applyingRoutine.am_exercises || []).map(e => ({
        name: e.name,
        sets: Array.from({ length: e.sets || 3 }, () => ({ reps: null, weight: null }))
      }))
    },
    cardio: existing?.cardio || { type: "Run", distance: 2, time: null },
    metcon: {
      rounds: existing?.metcon?.rounds ?? null,
      time: existing?.metcon?.time ?? null,
      rpe: existing?.metcon?.rpe ?? null,
      exercises: (applyingRoutine.metcon_exercises || []).map(e => ({ name: e.name, reps: e.reps ?? null }))
    },
    notes: existing?.notes || ''
  };
  const r = await fetch(`/api/workouts/${date}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(workout),
  });
  if (!r.ok) { const { error } = await r.json(); return alert('Apply failed: ' + error); }
  closeApply();
  // Jump straight into the day view
  location.href = '/?date=' + date;
}

init();
</script>
