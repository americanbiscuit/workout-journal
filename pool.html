<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1F1B17" />
<title>Exercise Pool — Workout Journal</title>
<style>
  :root {
    --bg: #F1EBDF; --surface: #F8F4EC; --surface-alt: #E8E0D0;
    --border: #DBD2BF; --border-soft: #E6DCC7;
    --text: #2D2A26; --text-2: #6B6660; --muted: #A39E97;
    --accent: #FF7A55; --accent-soft: #FFE9DF; --accent-2: #5DAA80;
    --warn: #E8A957; --gold: #F2B340; --danger: #DC6E6E;
    --header-bg: #1F1B17; --header-text: #F1EBDF; --header-text-2: #B0A89A;
    --header-border: #2F2A24;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    padding-bottom: 60px;
  }
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--header-bg); color: var(--header-text);
    padding: 16px max(20px, env(safe-area-inset-right)) 16px max(20px, env(safe-area-inset-left));
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--header-border);
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo .dot { color: var(--accent); }
  a.back {
    color: var(--header-text-2); text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 6px 12px; border: 1px solid var(--header-border); border-radius: 8px;
  }
  a.back:hover { color: var(--header-text); border-color: var(--accent); }

  main { max-width: 1080px; margin: 0 auto; padding: 22px 20px; }

  h1 { margin: 0 0 4px; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .subtle { color: var(--text-2); font-size: 14px; margin: 0 0 22px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 18px;
    position: sticky;
    top: 60px;
    z-index: 40;
  }
  .search-box {
    width: 100%;
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .search-box:focus { outline: none; border-color: var(--accent); background: white; }

  .chip-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 0; }
  .chip-row::-webkit-scrollbar { height: 4px; }
  .chip {
    background: var(--surface-alt);
    border: none;
    color: var(--text-2);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.3px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .chip.active { background: var(--text); color: var(--bg); }

  .row2 { display: flex; gap: 16px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .row2 .label {
    font-size: 10px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .toggle-row { display: flex; gap: 4px; background: var(--surface-alt); padding: 3px; border-radius: 999px; }
  .toggle-row button {
    background: transparent; border: none; color: var(--text-2);
    padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .toggle-row button.active { background: var(--text); color: var(--bg); }

  .stats { color: var(--text-2); font-size: 12px; font-weight: 600; margin-left: auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    display: flex; flex-direction: column; gap: 6px;
    transition: all 0.15s;
    position: relative;
  }
  .ex-card.favorite {
    background: linear-gradient(135deg, var(--surface), #FFF6E5);
    border-color: var(--gold);
  }
  .ex-card.hidden-pref {
    opacity: 0.45;
    background: var(--surface-alt);
  }
  .ex-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45, 42, 38, 0.08); }
  .ex-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    padding-right: 60px;
  }
  .ex-meta {
    color: var(--text-2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
  }
  .ex-meta .cat-am { color: var(--accent); }
  .ex-meta .cat-pm { color: var(--accent-2); }
  .ex-actions {
    position: absolute;
    top: 12px; right: 12px;
    display: flex; gap: 4px;
  }
  .pref-btn {
    background: var(--surface-alt);
    border: none;
    color: var(--muted);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .pref-btn:hover { transform: scale(1.1); }
  .pref-btn.star.on { background: var(--gold); color: white; }
  .pref-btn.hide.on { background: var(--muted); color: white; }
  .empty {
    text-align: center; color: var(--text-2); padding: 60px 20px; font-size: 14px;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-2);
    font-weight: 800;
    margin: 24px 0 10px 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count { color: var(--muted); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">Journal<span class="dot">.</span> — Exercises</div>
  <a class="back" href="/">← journal</a>
</header>

<main>
  <h1>Exercise Pool</h1>
  <p class="subtle">Browse, star your favorites, hide what you'd rather not see. Affects pickers throughout the app.</p>

  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="Search exercises..." oninput="render()" />
    <div class="chip-row" id="catChips"></div>
    <div class="row2">
      <span class="label">Phase</span>
      <div class="toggle-row" id="phaseToggle">
        <button data-v="all" class="active" onclick="setPhase('all')">All</button>
        <button data-v="am" onclick="setPhase('am')">AM</button>
        <button data-v="pm" onclick="setPhase('pm')">PM</button>
      </div>
      <span class="label">Show</span>
      <div class="toggle-row" id="showToggle">
        <button data-v="visible" class="active" onclick="setShowMode('visible')">Active</button>
        <button data-v="all" onclick="setShowMode('all')">All</button>
        <button data-v="favorites" onclick="setShowMode('favorites')">Stars</button>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </div>

  <div id="content"></div>
</main>

<script>
const POOL = {
  "Chest/Tri": {
    am: ["Machine Chest Press","Cable Chest Press","Incline DB Press","Flat DB Press","Decline DB Press","DB Chest Fly","Cable Fly (High)","Cable Fly (Mid)","Cable Fly (Low)","Pec Deck Machine","Single-Arm DB Press","Tricep Pushdown (Bar)","Tricep Pushdown (Rope)","Overhead Cable Tricep Extension","DB Skull Crushers","DB Tricep Kickback","Overhead DB Tricep Extension","Single-Arm DB Tricep Extension","Tate Press","Close-Grip DB Press","JM Press (DB)","Cable Single-Arm Pushdown"],
    pm: ["Standard Pushups","Diamond Pushups","Wide Pushups","Decline Pushups","Incline Pushups","Archer Pushups","Hindu Pushups","Pseudo Planche Pushups","Plyo Pushups","Clap Pushups","Spider-Man Pushups","T-Pushups","Parallel Bar Dips","Ring Dips","Bench Dips","Burpees","Tricep Pushdown Burnout","Pike Pushups (tri bias)","Pushup-to-Plank Taps","Explosive Pushups (off blocks)"]
  },
  "Back/Bi": {
    am: ["Lat Pulldown (Wide)","Lat Pulldown (Close-Grip)","Lat Pulldown (Neutral)","Cable Row (High)","Cable Row (Mid)","Cable Row (Low)","Single-Arm Cable Row","Machine Row (Iso)","T-Bar Row (Machine)","DB One-Arm Row","Chest-Supported DB Row","DB High Pull","Reverse Pec Deck","Face Pulls","Straight-Arm Pulldown","DB Shrugs","Cable Shrugs","DB Curls","Hammer Curls","Concentration Curls","Preacher Curl Machine","Cable Curls (Bar)","Cable Curls (Rope)","Incline DB Curls","Spider Curls","21s","Drag Curls","Cross-Body Hammer Curls","Zottman Curls"],
    pm: ["Pull-ups","Chin-ups","Neutral-Grip Pull-ups","Inverted Rows (TRX)","Inverted Rows (Bar)","Pushup Rows (Renegade)","Scapula Pulls","Dead Hangs","Chin Hold Isometric","Australian Pull-ups","Towel Rows","DB Curl Burnout","Hammer Curl Burnout","Cable Curl 21s","Band Pull-aparts","Face Pull Burnout"]
  },
  "Shoulders": {
    am: ["Machine Shoulder Press","Seated DB Shoulder Press","Standing DB Press","Arnold Press","Single-Arm DB Press","DB Lateral Raise","Cable Lateral Raise","Machine Lateral Raise","DB Front Raise","Cable Front Raise","Plate Front Raise","DB Rear Delt Fly","Reverse Pec Deck","Cable Rear Delt Cross","Face Pulls","Cable Y-Raise","Cable W-Raise","DB Shrugs","Cuban Press","Around-the-Worlds","Bottoms-Up DB Press","DB Z-Press"],
    pm: ["Pike Pushups","Decline Pike Pushups","Wall Walks","Wall Handstand Hold","Plank Shoulder Taps","Lateral Raise Burnout","Bear Crawls","Crab Walks","Plank-to-Down-Dog","Plate Shoulder Circles","Shoulder Tap Pushups","Pushup-to-Pike","Cable Lateral Iso Hold"]
  },
  "Abs": {
    am: ["Cable Crunches","Weighted Decline Situps","Ab Wheel Rollouts","Hanging Leg Raises","Hanging Knee Raises","Captain's Chair Leg Raises","Russian Twists (Weighted)","Plank w/ Plate","Side Plank w/ Weight","Bird Dog","DB Side Bends","Pallof Press (Cable)","Cable Wood Chops","Standing Cable Crunch","Stir-the-Pot","Weighted V-Ups"],
    pm: ["V-Ups","Hollow Holds","Hollow Rocks","Bicycle Crunches","Mountain Climbers","Plank","Side Plank","RKC Plank","Toes-to-Bar","Knees-to-Elbows","Dragon Flags","Windshield Wipers","L-Sit Hold","Russian Twists (BW)","Reverse Crunches","Flutter Kicks","Scissor Kicks","Plank Up-Downs","Cross-Body Mountain Climbers"]
  },
  "Legs": {
    am: ["Leg Press","Leg Curls (Seated)","Leg Curls (Lying)","Leg Extensions","Hack Squat Machine","DB Goblet Squat","DB Walking Lunges","DB Reverse Lunges","DB Step-Ups","Bulgarian Split Squat (DB)","DB Sumo Squat","DB Romanian Deadlift","DB Single-Leg RDL","Hip Thrust (Machine)","DB Hip Thrust","Glute Kickback Machine","Cable Kickbacks","Hip Abduction Machine","Hip Adduction Machine","Standing Calf Raise (DB)","Seated Calf Raise (Machine)","Single-Leg Calf Raise (DB)"],
    pm: ["Bulgarian Split Squat Jumps","Box Jumps","Broad Jumps","Jump Squats","Tuck Jumps","Lateral Box Jumps","Lateral Bounds","Skater Jumps","Single-Leg Hops","Walking Lunges (BW)","Reverse Lunges (BW)","Cossack Squats","Sissy Squats","Bulgarian Split Squats (BW)","Wall Sits","Pistol Squat Progressions","Step-Ups (BW)","Calf Raise Burnout"]
  },
  "Universal": {
    am: [],
    pm: ["Box Jumps","Ball Slams","Broad Jumps","Burpees","Mountain Climbers","Battle Ropes","Rowing Erg Sprint","Assault Bike Sprint","Jump Rope (singles)","Jump Rope (double-unders)","Bear Crawls","Crab Walks","Farmer Carry","Sled Push","Sled Pull","Devil Press","Thruster (DB)"]
  }
};
const CATEGORIES = ["Chest/Tri","Back/Bi","Shoulders","Abs","Legs","Universal"];

// Flatten the pool into an array with metadata
function flatten() {
  const out = [];
  CATEGORIES.forEach(cat => {
    POOL[cat].am.forEach(n => out.push({ name: n, category: cat, phase: 'am' }));
    POOL[cat].pm.forEach(n => out.push({ name: n, category: cat, phase: 'pm' }));
  });
  // De-dupe by name (some exercises appear under multiple categories — keep first)
  const seen = new Set();
  return out.filter(e => {
    if (seen.has(e.name)) return false;
    seen.add(e.name); return true;
  });
}
const ALL = flatten();

// ---- State ----
let prefs = { favorites: new Set(), hidden: new Set() };
let activeCategory = 'all'; // 'all' or category name
let activePhase = 'all';    // 'all' | 'am' | 'pm'
let showMode = 'visible';   // 'visible' | 'all' | 'favorites'

// ---- Init ----
async function init() {
  // Auth check
  const r = await fetch('/api/me');
  const { user } = await r.json();
  if (!user) { location.href = '/login.html'; return; }
  // Load prefs
  const pr = await fetch('/api/exercise-prefs');
  if (pr.ok) {
    const { favorites, hidden } = await pr.json();
    prefs.favorites = new Set(favorites);
    prefs.hidden = new Set(hidden);
  }
  // Render category chips
  document.getElementById('catChips').innerHTML = `
    <button class="chip active" data-cat="all" onclick="setCat('all')">All</button>
    ${CATEGORIES.map(c => `<button class="chip" data-cat="${c}" onclick="setCat('${c}')">${c}</button>`).join('')}
  `;
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setCat(c) {
  activeCategory = c;
  document.querySelectorAll('#catChips .chip').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === c);
  });
  render();
}
function setPhase(p) {
  activePhase = p;
  document.querySelectorAll('#phaseToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.v === p);
  });
  render();
}
function setShowMode(s) {
  showMode = s;
  document.querySelectorAll('#showToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.v === s);
  });
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = ALL.filter(e => {
    if (activeCategory !== 'all' && e.category !== activeCategory) return false;
    if (activePhase !== 'all' && e.phase !== activePhase) return false;
    if (q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  });
  // Apply show mode
  if (showMode === 'visible') list = list.filter(e => !prefs.hidden.has(e.name));
  else if (showMode === 'favorites') list = list.filter(e => prefs.favorites.has(e.name));
  // Sort: favorites first, then alphabetical, hidden last
  list.sort((a, b) => {
    const af = prefs.favorites.has(a.name), bf = prefs.favorites.has(b.name);
    const ah = prefs.hidden.has(a.name), bh = prefs.hidden.has(b.name);
    if (af !== bf) return af ? -1 : 1;
    if (ah !== bh) return ah ? 1 : -1;
    return a.name.localeCompare(b.name);
  });

  const stats = document.getElementById('stats');
  stats.textContent = `${list.length} exercise${list.length !== 1 ? 's' : ''} · ${prefs.favorites.size} starred · ${prefs.hidden.size} hidden`;

  const c = document.getElementById('content');
  if (!list.length) {
    c.innerHTML = `<div class="empty">No exercises match. Try clearing filters or search.</div>`;
    return;
  }
  c.innerHTML = `<div class="grid">${list.map(e => {
    const isFav = prefs.favorites.has(e.name);
    const isHid = prefs.hidden.has(e.name);
    const cls = ['ex-card'];
    if (isFav) cls.push('favorite');
    if (isHid) cls.push('hidden-pref');
    return `
      <div class="${cls.join(' ')}">
        <div class="ex-actions">
          <button class="pref-btn star ${isFav ? 'on' : ''}" onclick="togglePref('${escapeHtml(e.name).replace(/'/g, "\\'")}', 'favorite')" title="${isFav ? 'Unstar' : 'Star'}">★</button>
          <button class="pref-btn hide ${isHid ? 'on' : ''}" onclick="togglePref('${escapeHtml(e.name).replace(/'/g, "\\'")}', 'hidden')" title="${isHid ? 'Unhide' : 'Hide'}">✕</button>
        </div>
        <div class="ex-name">${escapeHtml(e.name)}</div>
        <div class="ex-meta">${e.category} · <span class="cat-${e.phase}">${e.phase.toUpperCase()}</span></div>
      </div>
    `;
  }).join('')}</div>`;
}

async function togglePref(name, kind) {
  const isCurrentlyThis = kind === 'favorite' ? prefs.favorites.has(name) : prefs.hidden.has(name);
  const newStatus = isCurrentlyThis ? null : kind;
  // Update local state
  prefs.favorites.delete(name);
  prefs.hidden.delete(name);
  if (newStatus === 'favorite') prefs.favorites.add(name);
  else if (newStatus === 'hidden') prefs.hidden.add(name);
  render();
  // Sync to server
  await fetch('/api/exercise-prefs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, status: newStatus }),
  });
}

init();
</script>
</body>
</html>
