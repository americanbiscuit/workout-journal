<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1F1B17" />
<title>Exercise Pool — Workout Journal</title>
<style>
  :root {
    --bg: #F1EBDF; --surface: #F8F4EC; --surface-alt: #E8E0D0;
    --border: #DBD2BF; --border-soft: #E6DCC7;
    --text: #2D2A26; --text-2: #6B6660; --muted: #A39E97;
    --accent: #FF7A55; --accent-soft: #FFE9DF; --accent-2: #5DAA80; --accent-2-soft: #DCEFE2;
    --warn: #E8A957; --gold: #F2B340; --danger: #DC6E6E;
    --header-bg: #1F1B17; --header-text: #F1EBDF; --header-text-2: #B0A89A;
    --header-border: #2F2A24;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    padding-bottom: 60px;
  }
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--header-bg); color: var(--header-text);
    padding: 16px max(20px, env(safe-area-inset-right)) 16px max(20px, env(safe-area-inset-left));
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--header-border);
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo .dot { color: var(--accent); }
  a.back {
    color: var(--header-text-2); text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 6px 12px; border: 1px solid var(--header-border); border-radius: 8px;
  }
  a.back:hover { color: var(--header-text); border-color: var(--accent); }
  main { max-width: 680px; margin: 0 auto; padding: 22px 20px; }
  h1 { margin: 0 0 4px; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .subtle { color: var(--text-2); font-size: 14px; margin: 0 0 18px; line-height: 1.5; }
  .controls {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
    position: sticky;
    top: 60px;
    z-index: 40;
  }
  .search-box {
    width: 100%;
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 10px;
    font-family: inherit;
  }
  .search-box:focus { outline: none; border-color: var(--accent); background: white; }
  .chip-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .chip {
    background: var(--surface-alt); border: none; color: var(--text-2);
    padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; letter-spacing: 0.3px; font-family: inherit;
    transition: all 0.15s;
  }
  .chip.active { background: var(--text); color: var(--bg); }
  .toggle-row { display: inline-flex; gap: 2px; background: var(--surface-alt); padding: 3px; border-radius: 999px; margin-top: 8px; }
  .toggle-row button {
    background: transparent; border: none; color: var(--text-2);
    padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .toggle-row button.active { background: var(--text); color: var(--bg); }
  .stats { color: var(--text-2); font-size: 12px; font-weight: 600; margin-top: 8px; }

  /* List view */
  .group-label {
    margin: 22px 0 8px 4px;
    font-size: 11px;
    color: var(--text-2);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .group-label.am { color: var(--accent); }
  .group-label.pm { color: var(--accent-2); }

  .ex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    padding: 14px 16px;
    margin-bottom: 6px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .ex-row:hover { background: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(45,42,38,0.06); }
  .ex-row .name-block { flex: 1; min-width: 0; }
  .ex-row .name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .ex-row .focus { color: var(--text-2); font-size: 12px; margin-top: 2px; line-height: 1.4; }
  .ex-row .badge-row { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .ex-row.fav .name { color: var(--gold); }
  .ex-row.fav { border-color: var(--gold); }
  .ex-row.hid { opacity: 0.45; }
  .star-mini {
    font-size: 14px; color: var(--gold);
    display: inline-block; margin-right: 4px;
  }

  /* Detail modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(45,42,38,0.45);
    display: none; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal-card {
    background: var(--bg); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 560px; max-height: 88vh;
    display: flex; flex-direction: column;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  .modal-head {
    padding: 18px 22px 16px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  }
  .modal-head .name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .modal-head .meta { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; margin-top: 4px; }
  .modal-close {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 13px;
    flex-shrink: 0;
  }
  .modal-body { padding: 18px 22px 24px; overflow-y: auto; flex: 1; }
  .section { margin-bottom: 18px; }
  .section h3 {
    margin: 0 0 8px; font-size: 11px; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
  }
  .focus-text {
    background: var(--surface); border-left: 3px solid var(--accent);
    padding: 12px 14px; border-radius: 0 8px 8px 0;
    font-size: 14px; line-height: 1.5; color: var(--text);
  }
  .focus-text.empty { border-left-color: var(--muted); color: var(--text-2); font-style: italic; }
  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 10px;
    font-size: 14px; font-family: inherit; resize: vertical; min-height: 70px;
  }
  textarea:focus { outline: none; border-color: var(--accent); background: white; }
  input[type=url] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 10px;
    font-size: 14px; font-family: inherit;
  }
  input[type=url]:focus { outline: none; border-color: var(--accent); background: white; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--accent); color: white; border: none;
    padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.secondary { background: var(--surface-alt); color: var(--text); }
  .btn.gold { background: var(--gold); }
  .btn.danger { background: var(--danger); }
  .yt-btn {
    background: #FF0000; color: white; padding: 11px 18px;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; font-family: inherit;
  }
  .yt-btn:hover { background: #cc0000; }
  .empty {
    text-align: center; color: var(--text-2); padding: 50px 20px; font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Journal<span class="dot">.</span> — Exercises</div>
  <a class="back" href="/">← journal</a>
</header>

<main>
  <h1>Exercise Pool</h1>
  <p class="subtle">Tap any exercise for form cues, video, and your own notes. Star favorites, hide what you don't want.</p>

  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="Search exercises..." oninput="render()" />
    <div class="chip-row" id="catChips"></div>
    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px;">
      <div class="toggle-row" id="phaseToggle">
        <button data-v="all" class="active" onclick="setPhase('all')">All</button>
        <button data-v="am" onclick="setPhase('am')">AM</button>
        <button data-v="pm" onclick="setPhase('pm')">PM</button>
      </div>
      <div class="toggle-row" id="showToggle">
        <button data-v="visible" class="active" onclick="setShowMode('visible')">Active</button>
        <button data-v="favorites" onclick="setShowMode('favorites')">Stars</button>
        <button data-v="all" onclick="setShowMode('all')">All</button>
      </div>
      <span class="stats" id="stats" style="margin-left:auto;"></span>
    </div>
  </div>

  <div id="content"></div>
</main>

<!-- Detail modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target.id==='modalBg') closeModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <div class="name" id="dName"></div>
        <div class="meta" id="dMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="section">
        <h3>Form focus</h3>
        <div id="dFocus" class="focus-text"></div>
      </div>
      <div class="section">
        <h3>Video</h3>
        <a id="dYouTube" class="yt-btn" href="#" target="_blank" rel="noopener">▶ Watch on YouTube</a>
      </div>
      <div class="section">
        <h3>Custom video URL <span style="color:var(--muted); font-weight:400; text-transform:none; letter-spacing:0; font-size:11px;">(optional — paste a specific video link)</span></h3>
        <input type="url" id="dCustomUrl" placeholder="https://youtube.com/watch?v=..." />
      </div>
      <div class="section">
        <h3>Your notes</h3>
        <textarea id="dCustomNotes" placeholder="Cues, tweaks, weights you've worked up to, etc."></textarea>
      </div>
      <div class="btn-row">
        <button id="dStarBtn" class="btn gold" onclick="toggleStar()">★ Star</button>
        <button id="dHideBtn" class="btn secondary" onclick="toggleHide()">Hide</button>
        <button class="btn" onclick="saveNotes()">Save Notes</button>
      </div>
    </div>
  </div>
</div>

<script>
const POOL = {
  "Chest/Tri": {
    am: ["Machine Chest Press","Cable Chest Press","Incline DB Press","Flat DB Press","Decline DB Press","DB Chest Fly","Cable Fly (High)","Cable Fly (Mid)","Cable Fly (Low)","Pec Deck Machine","Single-Arm DB Press","Tricep Pushdown (Bar)","Tricep Pushdown (Rope)","Overhead Cable Tricep Extension","DB Skull Crushers","DB Tricep Kickback","Overhead DB Tricep Extension","Single-Arm DB Tricep Extension","Tate Press","Close-Grip DB Press","JM Press (DB)","Cable Single-Arm Pushdown"],
    pm: ["Standard Pushups","Diamond Pushups","Wide Pushups","Decline Pushups","Incline Pushups","Archer Pushups","Hindu Pushups","Pseudo Planche Pushups","Plyo Pushups","Clap Pushups","Spider-Man Pushups","T-Pushups","Parallel Bar Dips","Ring Dips","Bench Dips","Burpees","Tricep Pushdown Burnout","Pike Pushups (tri bias)","Pushup-to-Plank Taps","Explosive Pushups (off blocks)"]

const CATEGORIES = ["Chest/Tri","Back/Bi","Shoulders","Abs","Legs","Universal"];

// Form focus cues — 1-2 line "what to focus on" per exercise
const FOCUS = {
  // Chest/Tri AM

// Helper: get focus text or fallback
function getFocus(name) {
  return FOCUS[name] || null;
}

// Flatten and dedupe pool
function flatten() {
  const out = [];
  CATEGORIES.forEach(cat => {
    POOL[cat].am.forEach(n => out.push({ name: n, category: cat, phase: 'am' }));
    POOL[cat].pm.forEach(n => out.push({ name: n, category: cat, phase: 'pm' }));
  });
  const seen = new Set();
  return out.filter(e => {
    if (seen.has(e.name)) return false;
    seen.add(e.name); return true;
  });
}
const ALL = flatten();

// State
let prefs = { favorites: new Set(), hidden: new Set() };
let activeCategory = 'Chest/Tri'; // start narrow — less cluttered default
let activePhase = 'all';
let showMode = 'visible';
let currentDetailEx = null;
let currentDetailNotes = { youtube_url: null, custom_notes: null };

async function init() {
  const r = await fetch('/api/me');
  const { user } = await r.json();
  if (!user) { location.href = '/login.html'; return; }
  const pr = await fetch('/api/exercise-prefs');
  if (pr.ok) {
    const { favorites, hidden } = await pr.json();
    prefs.favorites = new Set(favorites);
    prefs.hidden = new Set(hidden);
  }
  document.getElementById('catChips').innerHTML = `
    <button class="chip" data-cat="all" onclick="setCat('all')">All</button>
    ${CATEGORIES.map(c => `<button class="chip ${c === activeCategory ? 'active' : ''}" data-cat="${c}" onclick="setCat('${c}')">${c}</button>`).join('')}
  `;
  render();
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function setCat(c) {
  activeCategory = c;
  document.querySelectorAll('#catChips .chip').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  render();
}
function setPhase(p) {
  activePhase = p;
  document.querySelectorAll('#phaseToggle button').forEach(b => b.classList.toggle('active', b.dataset.v === p));
  render();
}
function setShowMode(s) {
  showMode = s;
  document.querySelectorAll('#showToggle button').forEach(b => b.classList.toggle('active', b.dataset.v === s));
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = ALL.filter(e => {
    if (activeCategory !== 'all' && e.category !== activeCategory) return false;
    if (activePhase !== 'all' && e.phase !== activePhase) return false;
    if (q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  });
  if (showMode === 'visible') list = list.filter(e => !prefs.hidden.has(e.name));
  else if (showMode === 'favorites') list = list.filter(e => prefs.favorites.has(e.name));

  // Group by phase if showing all phases (cleaner visual hierarchy)
  list.sort((a, b) => {
    if (a.phase !== b.phase) return a.phase < b.phase ? -1 : 1;
    const af = prefs.favorites.has(a.name), bf = prefs.favorites.has(b.name);
    if (af !== bf) return af ? -1 : 1;
    const ah = prefs.hidden.has(a.name), bh = prefs.hidden.has(b.name);
    if (ah !== bh) return ah ? 1 : -1;
    return a.name.localeCompare(b.name);
  });

  document.getElementById('stats').textContent = `${list.length} · ${prefs.favorites.size}★ · ${prefs.hidden.size} hidden`;

  const c = document.getElementById('content');
  if (!list.length) {
    c.innerHTML = `<div class="empty">No exercises match. Try a different filter or search.</div>`;
    return;
  }

  let html = '';
  let lastPhase = null;
  list.forEach(e => {
    if (activePhase === 'all' && e.phase !== lastPhase) {
      lastPhase = e.phase;
      html += `<div class="group-label ${e.phase}">${e.phase === 'am' ? 'Morning · Strength' : 'Afternoon · Endurance/Supplement'}</div>`;
    }
    const isFav = prefs.favorites.has(e.name);
    const isHid = prefs.hidden.has(e.name);
    const focus = getFocus(e.name);
    html += `
      <div class="ex-row ${isFav ? 'fav' : ''} ${isHid ? 'hid' : ''}" onclick="openDetail('${escapeHtml(e.name).replace(/'/g, "\\'")}', '${e.category}', '${e.phase}')">
        <div class="name-block">
          <div class="name">${isFav ? '<span class="star-mini">★</span>' : ''}${escapeHtml(e.name)}</div>
          <div class="focus">${focus ? escapeHtml(focus) : '<em>Tap for video + add your notes</em>'}</div>
        </div>
      </div>
    `;
  });
  c.innerHTML = html;
}

// ===== Detail modal =====
async function openDetail(name, category, phase) {
  currentDetailEx = { name, category, phase };
  document.getElementById('dName').textContent = name;
  document.getElementById('dMeta').textContent = `${category} · ${phase.toUpperCase()}`;
  const focus = getFocus(name);
  document.getElementById('dFocus').className = focus ? 'focus-text' : 'focus-text empty';
  document.getElementById('dFocus').textContent = focus || 'No focus notes yet. Add your own below.';
  // Default YouTube link (search)
  const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(name + ' form tutorial')}`;
  // Load user's custom notes/url
  currentDetailNotes = { youtube_url: null, custom_notes: null };
  document.getElementById('dCustomUrl').value = '';
  document.getElementById('dCustomNotes').value = '';
  document.getElementById('dYouTube').href = searchUrl;
  try {
    const r = await fetch(`/api/exercise-notes/${encodeURIComponent(name)}`);
    if (r.ok) {
      const data = await r.json();
      currentDetailNotes = data;
      if (data.youtube_url) {
        document.getElementById('dCustomUrl').value = data.youtube_url;
        document.getElementById('dYouTube').href = data.youtube_url;
        document.getElementById('dYouTube').textContent = '▶ Watch (your video)';
      } else {
        document.getElementById('dYouTube').textContent = '▶ Search on YouTube';
      }
      document.getElementById('dCustomNotes').value = data.custom_notes || '';
    }
  } catch {}
  // Star + hide button state
  const isFav = prefs.favorites.has(name);
  const isHid = prefs.hidden.has(name);
  const starBtn = document.getElementById('dStarBtn');
  const hideBtn = document.getElementById('dHideBtn');
  starBtn.textContent = isFav ? '★ Starred' : '★ Star';
  starBtn.className = `btn ${isFav ? 'gold' : 'secondary'}`;
  hideBtn.textContent = isHid ? 'Unhide' : 'Hide';
  hideBtn.className = `btn ${isHid ? 'danger' : 'secondary'}`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  currentDetailEx = null;
}

async function toggleStar() {
  if (!currentDetailEx) return;
  const name = currentDetailEx.name;
  const wasFav = prefs.favorites.has(name);
  const newStatus = wasFav ? null : 'favorite';
  prefs.favorites.delete(name);
  prefs.hidden.delete(name);
  if (newStatus === 'favorite') prefs.favorites.add(name);
  // Update buttons + re-render list under hood
  openDetail(name, currentDetailEx.category, currentDetailEx.phase); // refresh modal state
  await fetch('/api/exercise-prefs', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, status: newStatus }),
  });
  render();
}
async function toggleHide() {
  if (!currentDetailEx) return;
  const name = currentDetailEx.name;
  const wasHid = prefs.hidden.has(name);
  const newStatus = wasHid ? null : 'hidden';
  prefs.favorites.delete(name);
  prefs.hidden.delete(name);
  if (newStatus === 'hidden') prefs.hidden.add(name);
  openDetail(name, currentDetailEx.category, currentDetailEx.phase);
  await fetch('/api/exercise-prefs', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, status: newStatus }),
  });
  render();
}

async function saveNotes() {
  if (!currentDetailEx) return;
  const youtube_url = document.getElementById('dCustomUrl').value.trim();
  const custom_notes = document.getElementById('dCustomNotes').value.trim();
  const r = await fetch(`/api/exercise-notes/${encodeURIComponent(currentDetailEx.name)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ youtube_url, custom_notes }),
  });
  if (!r.ok) return alert('Save failed');
  // Briefly show "Saved" feedback
  const allBtns = document.querySelectorAll('.btn-row .btn');
  const saveBtn = Array.from(allBtns).find(b => b.textContent.includes('Save Notes'));
  if (saveBtn) {
    saveBtn.textContent = 'Saved ✓';
    setTimeout(() => { saveBtn.textContent = 'Save Notes'; }, 1200);
  }
}

init();
</script>
