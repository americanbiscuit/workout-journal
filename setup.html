<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1F1B17" />
<title>First-time setup — Workout Journal</title>
<style>
  :root {
    --bg: #F1EBDF; --surface: #F8F4EC; --surface-alt: #E8E0D0; --border: #DBD2BF;
    --text: #2D2A26; --text-2: #6B6660; --muted: #A39E97;
    --accent: #FF7A55; --danger: #DC6E6E;
    --header-bg: #1F1B17; --header-text: #F1EBDF;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    display: flex; flex-direction: column; }
  header {
    background: var(--header-bg); color: var(--header-text);
    padding: 18px max(20px, env(safe-area-inset-right)) 18px max(20px, env(safe-area-inset-left));
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo .dot { color: var(--accent); }
  main { flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px; max-width: 460px; width: 100%; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 24px; width: 100%;
    box-shadow: 0 4px 16px rgba(45, 42, 38, 0.08); }
  h1 { margin: 0 0 6px; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .subtle { color: var(--text-2); font-size: 14px; margin-bottom: 18px; line-height: 1.5; }
  .note { background: rgba(255, 122, 85, 0.1); border: 1px solid rgba(255, 122, 85, 0.3);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 18px; }
  label { display: block; font-size: 11px; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700;
    margin: 14px 0 6px; }
  input { width: 100%; background: var(--surface-alt); border: 1.5px solid transparent;
    color: var(--text); padding: 12px 14px; border-radius: 10px;
    font-size: 16px; font-family: inherit; font-weight: 600; }
  input:focus { outline: none; border-color: var(--accent); background: white; }
  button { width: 100%; background: var(--accent); color: white; border: none;
    padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 20px; font-family: inherit; }
  button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255, 122, 85, 0.3); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { background: rgba(220, 110, 110, 0.1); border: 1px solid rgba(220, 110, 110, 0.3);
    color: var(--danger); padding: 10px 14px; border-radius: 10px;
    font-size: 13px; margin-top: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">Journal<span class="dot">.</span></div>
</header>

<main>
  <div class="card">
    <h1>First-time setup</h1>
    <p class="subtle">Create your admin account. You'll be able to log in afterward and manage other users.</p>
    <div class="note">This page only works once — when there are no users yet. After this, additional users are created from the admin portal.</div>
    <form onsubmit="event.preventDefault(); setup();">
      <label>Display name</label>
      <input id="name" type="text" placeholder="Tanner" required />
      <label>Username (for login)</label>
      <input id="username" type="text" placeholder="tanner" autocapitalize="off" autocorrect="off" required />
      <label>Password (8+ chars)</label>
      <input id="password" type="password" minlength="8" required />
      <button id="submitBtn" type="submit">Create account & sign in</button>
    </form>
    <div id="error" style="display:none" class="error"></div>
  </div>
</main>

<script>
async function check() {
  try {
    const r = await fetch('/api/setup');
    const { setupNeeded } = await r.json();
    if (!setupNeeded) location.href = '/login.html';
  } catch {}
}
async function setup() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Creating...';
  try {
    const r = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    if (!r.ok) {
      const { error } = await r.json();
      throw new Error(error || 'Setup failed');
    }
    location.href = '/';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create account & sign in';
  }
}
check();
</script>
</body>
</html>
