<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF7F2" />
<title>Workout Journal</title>
<style>
  :root {
    --bg: #F1EBDF;             /* softer warm sand, less bright than pure cream */
    --surface: #F8F4EC;        /* soft warm white for cards, not stark */
    --surface-alt: #E8E0D0;    /* warm beige for inputs */
    --surface-2: #FCF9F2;
    --border: #DBD2BF;
    --border-soft: #E6DCC7;
    --text: #2D2A26;
    --text-2: #6B6660;
    --muted: #A39E97;
    --accent: #FF7A55;
    --accent-soft: #FFE9DF;
    --accent-2: #5DAA80;
    --accent-2-soft: #DCEFE2;
    --warn: #E8A957;
    --danger: #DC6E6E;
    /* Dark header palette */
    --header-bg: #1F1B17;      /* deep warm near-black */
    --header-text: #F1EBDF;
    --header-text-2: #B0A89A;
    --header-border: #2F2A24;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(45, 42, 38, 0.06);
    --shadow-md: 0 4px 16px rgba(45, 42, 38, 0.08);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Inter", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: calc(100px + var(--safe-bottom));
  }
  button { font-family: inherit; }
  input, select, textarea {
    font-family: inherit;
    font-size: 16px;
  }

  /* ============ HEADER (dark) ============ */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--header-bg);
    color: var(--header-text);
    border-bottom: 1px solid var(--header-border);
    /* Respect safe-area insets on notched phones so the menu button isn't flush against the edge */
    padding: 18px max(20px, env(safe-area-inset-right)) 18px max(20px, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .logo {
    font-size: 20px;
    font-weight: 800;
    color: var(--header-text);
    letter-spacing: -0.5px;
  }
  .logo .dot {
    color: var(--accent);
  }
  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--header-border);
    color: var(--header-text-2);
    width: 40px;
    height: 40px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--header-text); border-color: var(--accent); background: rgba(255, 122, 85, 0.15); }
  .icon-btn:active { transform: scale(0.95); }
  .user-badge {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--header-border);
    color: var(--header-text-2);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .user-badge.impersonating {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    cursor: pointer;
  }
  .user-badge .badge-label {
    font-size: 9px;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .user-badge .badge-x {
    margin-left: 4px;
    font-weight: 700;
    opacity: 0.85;
  }

  /* ============ VIEW TOGGLE (in dark header) ============ */
  .view-toggle {
    display: inline-flex;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    padding: 4px;
    gap: 0;
  }
  .view-toggle button {
    background: transparent;
    border: none;
    color: var(--header-text-2);
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.18s;
  }
  .view-toggle button.active {
    background: var(--header-text);
    color: var(--header-bg);
    box-shadow: var(--shadow-sm);
  }

  /* ============ MAIN ============ */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 0;
  }

  /* ============ DAY HEADER (in day view) ============ */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 12px;
  }
  .day-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .day-nav:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .date-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .date-info .day-name {
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .date-info .date-text {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .date-info input[type="date"] {
    border: none;
    background: transparent;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    padding: 0;
    display: none;
  }
  .date-info.editing .date-text { display: none; }
  .date-info.editing input[type="date"] { display: block; }

  .category-pill {
    background: var(--accent);
    color: white;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(255, 122, 85, 0.25);
  }
  .category-pill:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(255, 122, 85, 0.35); }

  /* ============ SECTIONS ============ */
  .section {
    margin-bottom: 28px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    font-weight: 800;
    color: var(--text-2);
  }
  .section-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* ============ EXERCISE CARDS ============ */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .exercise-card:hover { box-shadow: var(--shadow-md); }
  .exercise-head {
    padding: 16px 18px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .exercise-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .exercise-menu {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .exercise-menu:hover { color: var(--danger); background: rgba(220, 110, 110, 0.08); }
  .last-hint {
    color: var(--text-2);
    font-size: 12px;
    padding: 0 18px 10px;
  }
  .last-hint b { color: var(--accent-2); font-weight: 700; }

  .sets-list { padding: 0 18px 14px; }
  .sets-header {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 32px;
    gap: 10px;
    padding: 10px 0 8px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    border-bottom: 1px solid var(--border-soft);
  }
  .sets-header div:nth-child(1) { text-align: center; }
  .set-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 32px;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .set-row:last-of-type { border-bottom: none; }
  .set-num {
    background: var(--surface-alt);
    border-radius: 8px;
    text-align: center;
    font-weight: 700;
    color: var(--text-2);
    font-size: 13px;
    padding: 9px 0;
  }
  .set-row input {
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    text-align: center;
    font-weight: 700;
    width: 100%;
    transition: all 0.15s;
  }
  .set-row input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .set-row input::placeholder { color: var(--muted); font-weight: 500; }
  .set-del {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
  }
  .set-del:hover { color: var(--danger); background: rgba(220, 110, 110, 0.08); }
  .add-set-btn {
    width: 100%;
    background: var(--surface-alt);
    border: none;
    color: var(--text-2);
    padding: 12px;
    border-radius: var(--radius-sm);
    margin-top: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .add-set-btn:hover { background: var(--accent-soft); color: var(--accent); }

  .add-exercise-btn {
    width: 100%;
    background: var(--surface);
    border: 2px dashed var(--border);
    color: var(--text-2);
    padding: 18px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .add-exercise-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .add-exercise-btn:active { transform: translateY(0); }

  /* ============ PM CARDS ============ */
  .pm-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .pm-row {
    display: grid;
    gap: 12px;
  }
  .pm-row.two { grid-template-columns: 1fr 1fr; }
  .pm-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .input-group { display: flex; flex-direction: column; }
  .input-group label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .input-group input, .input-group select {
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    text-align: center;
    transition: all 0.15s;
  }
  .input-group input:focus, .input-group select:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .input-group input::placeholder { color: var(--muted); font-weight: 500; }
  .input-group select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-2) 50%), linear-gradient(135deg, var(--text-2) 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 32px;
    text-align: left;
  }

  .metcon-row {
    display: grid;
    grid-template-columns: 1fr 90px 32px;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .metcon-row:last-of-type { border-bottom: none; }
  .metcon-row input {
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-weight: 700;
  }
  .metcon-row input[type="number"] { text-align: center; }
  .metcon-row input:focus { outline: none; border-color: var(--accent); background: white; }

  /* ============ COLLAPSE (notes) ============ */
  details.collapse {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  details.collapse summary {
    cursor: pointer;
    padding: 16px 18px;
    list-style: none;
    color: var(--text-2);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.collapse summary::-webkit-details-marker { display: none; }
  details.collapse summary::after {
    content: "+";
    color: var(--muted);
    font-size: 18px;
    font-weight: 600;
    transition: transform 0.2s;
  }
  details.collapse[open] summary::after { transform: rotate(45deg); }
  details.collapse .collapse-body { padding: 0 18px 18px; }
  details.collapse textarea {
    width: 100%;
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    resize: vertical;
    min-height: 90px;
    font-size: 15px;
    transition: all 0.15s;
    margin-top: 12px;
  }
  details.collapse textarea:focus { outline: none; border-color: var(--accent); background: white; }

  /* ============ WEEK VIEW ============ */
  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .week-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .week-nav { display: flex; gap: 6px; }
  .week-grid {
    display: grid;
    gap: 10px;
  }
  .week-day-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .week-day-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .week-day-card.today {
    border: 2px solid var(--accent);
    background: linear-gradient(135deg, var(--surface), var(--accent-soft));
  }
  .week-day-card .row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .week-day-card .dayname {
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .week-day-card.today .dayname { color: var(--accent); }
  .week-day-card .dnum {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .week-day-card .category-mini {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .week-day-card .summary {
    color: var(--text-2);
    font-size: 13px;
    margin-top: 8px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .week-day-card .summary span { white-space: nowrap; }
  .week-day-card .summary b { color: var(--text); font-weight: 700; }
  .week-day-card.empty .summary { color: var(--muted); font-style: italic; }

  /* ============ MONTH VIEW ============ */
  .month-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .month-weekdays span {
    text-align: center;
    font-size: 10px;
    color: var(--text-2);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .month-cell {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 6px 6px 8px;
    min-height: 64px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.15s;
  }
  .month-cell:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .month-cell.other-month {
    background: transparent;
    border-color: transparent;
    opacity: 0.35;
  }
  .month-cell.today {
    border: 2px solid var(--accent);
    background: var(--accent-soft);
  }
  .month-cell.has-data {
    background: var(--surface-2);
    border-color: var(--border);
  }
  .month-cell-day {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .month-cell.other-month .month-cell-day { color: var(--muted); font-weight: 500; }
  .month-cell.today .month-cell-day { color: var(--accent); }
  .month-cell-cat {
    font-size: 8px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .month-cell-dots {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .month-cell-dots .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .dot-lift { background: var(--accent); }
  .dot-cardio { background: var(--accent-2); }
  .dot-metcon { background: var(--warn); }

  .month-legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 18px;
    color: var(--text-2);
    font-size: 12px;
    font-weight: 600;
  }
  .month-legend .leg-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .leg-lift { background: var(--accent); }
  .leg-cardio { background: var(--accent-2); }
  .leg-metcon { background: var(--warn); }

  /* On very narrow phones, shrink cells */
  @media (max-width: 420px) {
    .month-cell { min-height: 56px; padding: 5px 4px 6px; }
    .month-cell-day { font-size: 12px; }
    .month-cell-cat { font-size: 7px; }
    .month-cell-dots .dot { width: 5px; height: 5px; }
  }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(45, 42, 38, 0.45);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.show { display: flex; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: var(--bg);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.25s ease-out;
    box-shadow: 0 -8px 32px rgba(45, 42, 38, 0.15);
  }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  .modal-head {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border-soft);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
  }
  .modal-head-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
  .modal-close {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
  }
  .modal-search {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    font-size: 15px;
  }
  .modal-search:focus { outline: none; border-color: var(--accent); }
  .chips {
    display: flex;
    gap: 8px;
    padding: 14px 20px 10px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border-soft);
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .chip.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .modal-body {
    overflow-y: auto;
    padding: 8px 0;
    flex: 1;
  }
  .exercise-pick {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.1s;
  }
  .exercise-pick:hover, .exercise-pick:active { background: var(--surface); }
  .exercise-pick .name { font-size: 15px; font-weight: 600; color: var(--text); }
  .exercise-pick .add-icon {
    color: var(--accent);
    font-size: 22px;
    font-weight: 700;
  }
  .group-label {
    padding: 14px 20px 6px;
    color: var(--text-2);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 800;
  }
  .menu-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    transition: background 0.1s;
  }
  .menu-item:hover { background: var(--surface); }
  .menu-item .meta { color: var(--muted); font-size: 13px; }
  .menu-item.danger { color: var(--danger); }

  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-2);
    font-size: 14px;
  }

  /* ============ SAVE PILL ============ */
  .save-pill {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    right: 20px;
    background: var(--text);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    z-index: 40;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(8px);
    pointer-events: none;
    letter-spacing: 0.5px;
    box-shadow: var(--shadow-md);
  }
  .save-pill.show { opacity: 1; transform: translateY(0); }

  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header>
  <div class="logo">Journal<span class="dot">.</span></div>
  <div class="view-toggle">
    <button id="dayViewBtn" class="active" onclick="setView('day')">Day</button>
    <button id="weekViewBtn" onclick="setView('week')">Week</button>
    <button id="monthViewBtn" onclick="setView('month')">Month</button>
  </div>
  <div class="header-actions">
    <div id="userBadge"></div>
    <button class="icon-btn" onclick="openModal('settings')" title="Menu">≡</button>
  </div>
</header>

<main>

  <!-- DAY VIEW -->
  <div id="dayView">
    <div class="day-header">
      <div class="day-header-left">
        <button class="day-nav" onclick="shiftDay(-1)">‹</button>
        <div class="date-info" id="dateInfo">
          <div class="day-name" id="dayLabel">FRIDAY</div>
          <div class="date-text" id="dateDisplay" onclick="editDate()">Jun 30</div>
          <input type="date" id="entryDate" onchange="onDateChange()" onblur="finishDateEdit()" />
        </div>
        <button class="day-nav" onclick="shiftDay(1)">›</button>
      </div>
      <button class="category-pill" id="categoryPill" onclick="openModal('category')">LEGS</button>
    </div>

    <!-- AM STRENGTH -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Morning Strength</div>
        <div class="section-sub">machines + DBs</div>
      </div>
      <div id="amList"></div>
      <button class="add-exercise-btn" onclick="openModal('picker', 'am')">Add Exercise</button>
    </div>

    <!-- PM CARDIO -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Afternoon Cardio</div>
      </div>
      <div class="pm-card">
        <div class="pm-row three">
          <div class="input-group">
            <label>Type</label>
            <select id="cardioType" onchange="autoSave()">
              <option>Run</option><option>Walk</option><option>Run/Walk</option>
              <option>Bike</option><option>Row</option><option>—</option>

          </div>
          <div class="input-group">
            <label>Distance (mi)</label>
            <input type="number" step="0.1" id="cardioDist" value="2" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>Time (min)</label>
            <input type="number" step="0.1" id="cardioTime" onchange="autoSave()" />
          </div>
        </div>
      </div>
    </div>

    <!-- PM METCON -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Afternoon Metcon</div>
        <div class="section-sub">supplement work</div>
      </div>
      <div class="pm-card">
        <div class="pm-row three" style="margin-bottom: 14px">
          <div class="input-group">
            <label>Rounds</label>
            <input type="number" id="metconRounds" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>Time (min)</label>
            <input type="number" step="0.5" id="metconTime" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>RPE /10</label>
            <input type="number" min="1" max="10" id="metconRPE" onchange="autoSave()" />
          </div>
        </div>
        <div id="metconList"></div>
        <button class="add-exercise-btn" style="margin-top: 12px; padding: 14px;" onclick="openModal('picker', 'metcon')">Add Movement</button>
      </div>
    </div>

    <!-- VITALS + NOTES -->
    <details class="collapse" style="margin-top: 24px">
      <summary>Vitals + Notes</summary>
      <div class="collapse-body">
        <div class="pm-row three" style="margin-top: 12px">
          <div class="input-group">
            <label>Body Wt</label>
            <input type="number" id="bodyWeight" placeholder="—" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>Sleep (hr)</label>
            <input type="number" step="0.5" id="sleep" placeholder="—" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>Energy /10</label>
            <input type="number" min="1" max="10" id="energy" placeholder="—" onchange="autoSave()" />
          </div>
        </div>
        <textarea id="dayNotes" placeholder="How'd it go? Anything to remember next time?" onchange="autoSave()"></textarea>
      </div>
    </details>
  </div>

  <!-- WEEK VIEW -->
  <div id="weekView" style="display:none">
    <div class="week-header">
      <button class="day-nav" onclick="shiftWeek(-1)">‹</button>
      <div class="week-title" id="weekTitle">This Week</div>
      <button class="day-nav" onclick="shiftWeek(1)">›</button>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- MONTH VIEW -->
  <div id="monthView" style="display:none">
    <div class="week-header">
      <button class="day-nav" onclick="shiftMonth(-1)">‹</button>
      <div class="week-title" id="monthTitle">This Month</div>
      <button class="day-nav" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="month-weekdays">
      <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
    </div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="month-legend">
      <span class="leg-dot leg-lift"></span> lift
      <span class="leg-dot leg-cardio"></span> cardio
      <span class="leg-dot leg-metcon"></span> metcon
    </div>
  </div>

</main>

<!-- SAVE PILL -->
<div class="save-pill" id="savePill">Saved</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <div class="modal-title" id="modalTitle">Title</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modalSearch"></div>
    </div>
    <div id="modalChips"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================
// EXERCISE POOL
// ============================================================
const POOL = {
  "Chest/Tri": {
    am: ["Machine Chest Press","Cable Chest Press","Incline DB Press","Flat DB Press","Decline DB Press","DB Chest Fly","Cable Fly (High)","Cable Fly (Mid)","Cable Fly (Low)","Pec Deck Machine","Single-Arm DB Press","Tricep Pushdown (Bar)","Tricep Pushdown (Rope)","Overhead Cable Tricep Extension","DB Skull Crushers","DB Tricep Kickback","Overhead DB Tricep Extension","Single-Arm DB Tricep Extension","Tate Press","Close-Grip DB Press","JM Press (DB)","Cable Single-Arm Pushdown"],
    pm: ["Standard Pushups","Diamond Pushups","Wide Pushups","Decline Pushups","Incline Pushups","Archer Pushups","Hindu Pushups","Pseudo Planche Pushups","Plyo Pushups","Clap Pushups","Spider-Man Pushups","T-Pushups","Parallel Bar Dips","Ring Dips","Bench Dips","Burpees","Tricep Pushdown Burnout","Pike Pushups (tri bias)","Pushup-to-Plank Taps","Explosive Pushups (off blocks)"]
  },
  "Back/Bi": {
    am: ["Lat Pulldown (Wide)","Lat Pulldown (Close-Grip)","Lat Pulldown (Neutral)","Cable Row (High)","Cable Row (Mid)","Cable Row (Low)","Single-Arm Cable Row","Machine Row (Iso)","T-Bar Row (Machine)","DB One-Arm Row","Chest-Supported DB Row","DB High Pull","Reverse Pec Deck","Face Pulls","Straight-Arm Pulldown","DB Shrugs","Cable Shrugs","DB Curls","Hammer Curls","Concentration Curls","Preacher Curl Machine","Cable Curls (Bar)","Cable Curls (Rope)","Incline DB Curls","Spider Curls","21s","Drag Curls","Cross-Body Hammer Curls","Zottman Curls"],
    pm: ["Pull-ups","Chin-ups","Neutral-Grip Pull-ups","Inverted Rows (TRX)","Inverted Rows (Bar)","Pushup Rows (Renegade)","Scapula Pulls","Dead Hangs","Chin Hold Isometric","Australian Pull-ups","Towel Rows","DB Curl Burnout","Hammer Curl Burnout","Cable Curl 21s","Band Pull-aparts","Face Pull Burnout"]
  },
  "Shoulders": {
    am: ["Machine Shoulder Press","Seated DB Shoulder Press","Standing DB Press","Arnold Press","Single-Arm DB Press","DB Lateral Raise","Cable Lateral Raise","Machine Lateral Raise","DB Front Raise","Cable Front Raise","Plate Front Raise","DB Rear Delt Fly","Reverse Pec Deck","Cable Rear Delt Cross","Face Pulls","Cable Y-Raise","Cable W-Raise","DB Shrugs","Cuban Press","Around-the-Worlds","Bottoms-Up DB Press","DB Z-Press"],
    pm: ["Pike Pushups","Decline Pike Pushups","Wall Walks","Wall Handstand Hold","Plank Shoulder Taps","Lateral Raise Burnout","Bear Crawls","Crab Walks","Plank-to-Down-Dog","Plate Shoulder Circles","Shoulder Tap Pushups","Pushup-to-Pike","Cable Lateral Iso Hold"]
  },
  "Abs": {
    am: ["Cable Crunches","Weighted Decline Situps","Ab Wheel Rollouts","Hanging Leg Raises","Hanging Knee Raises","Captain's Chair Leg Raises","Russian Twists (Weighted)","Plank w/ Plate","Side Plank w/ Weight","Bird Dog","DB Side Bends","Pallof Press (Cable)","Cable Wood Chops","Standing Cable Crunch","Stir-the-Pot","Weighted V-Ups"],
    pm: ["V-Ups","Hollow Holds","Hollow Rocks","Bicycle Crunches","Mountain Climbers","Plank","Side Plank","RKC Plank","Toes-to-Bar","Knees-to-Elbows","Dragon Flags","Windshield Wipers","L-Sit Hold","Russian Twists (BW)","Reverse Crunches","Flutter Kicks","Scissor Kicks","Plank Up-Downs","Cross-Body Mountain Climbers"]
  },
  "Legs": {
    am: ["Leg Press","Leg Curls (Seated)","Leg Curls (Lying)","Leg Extensions","Hack Squat Machine","DB Goblet Squat","DB Walking Lunges","DB Reverse Lunges","DB Step-Ups","Bulgarian Split Squat (DB)","DB Sumo Squat","DB Romanian Deadlift","DB Single-Leg RDL","Hip Thrust (Machine)","DB Hip Thrust","Glute Kickback Machine","Cable Kickbacks","Hip Abduction Machine","Hip Adduction Machine","Standing Calf Raise (DB)","Seated Calf Raise (Machine)","Single-Leg Calf Raise (DB)"],
    pm: ["Bulgarian Split Squat Jumps","Box Jumps","Broad Jumps","Jump Squats","Tuck Jumps","Lateral Box Jumps","Lateral Bounds","Skater Jumps","Single-Leg Hops","Walking Lunges (BW)","Reverse Lunges (BW)","Cossack Squats","Sissy Squats","Bulgarian Split Squats (BW)","Wall Sits","Pistol Squat Progressions","Step-Ups (BW)","Calf Raise Burnout"]
  },
  "Universal": {
    am: [],
    pm: ["Box Jumps","Ball Slams","Broad Jumps","Burpees","Mountain Climbers","Battle Ropes","Rowing Erg Sprint","Assault Bike Sprint","Jump Rope (singles)","Jump Rope (double-unders)","Bear Crawls","Crab Walks","Farmer Carry","Sled Push","Sled Pull","Devil Press","Thruster (DB)"]
  }
};
const DAY_TO_CATEGORY = { 0: "Abs", 1: "Chest/Tri", 2: "Back/Bi", 3: "Shoulders", 4: "Abs", 5: "Legs", 6: "Abs" };
const FULL_DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT_DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const CATEGORY_LIST = ["Chest/Tri","Back/Bi","Shoulders","Abs","Legs"];

// ============================================================
// AUTH + STATE — D1-backed with session cookie
// ============================================================
const STATE_KEY = 'workout-journal-v2';
const LEGACY_KEY = 'workout-journal-v1';
let API_BASE = '/api/workouts';  // gets ?asUser= appended for admin impersonation
let asUserId = null;             // admin impersonation target
let currentUserObj = null;       // current logged-in user (admin if impersonating)
let viewingUserObj = null;       // user whose workouts we're showing (= currentUserObj unless impersonating)
let userPrefs = { favorites: new Set(), hidden: new Set() };  // exercise prefs (star/hide)
let userCustomExercises = [];    // user's custom-added exercises (merge with POOL)

let state = loadLocal();
let syncEnabled = location.hostname !== '' && location.protocol !== 'file:';

function apiUrl(path) {
  // Append ?asUser= when admin is impersonating
  if (asUserId) {
    const sep = path.includes('?') ? '&' : '?';
    return path + sep + 'asUser=' + asUserId;
  }
  return path;
}

function loadLocal() {
  const v2 = localStorage.getItem(STATE_KEY);
  if (v2) return JSON.parse(v2);
  const v1 = localStorage.getItem(LEGACY_KEY);
  if (v1) {
    try {
      const old = JSON.parse(v1);
      return { workouts: (old.workouts || []).map(w => ({
        date: w.date, category: w.category,
        bodyWeight: w.bodyWeight, sleep: w.sleep, energy: w.energy,
        am: { exercises: (w.am?.exercises || []).map(e => ({
          name: e.name,
          sets: Array.from({length: e.sets || 1}, () => ({ reps: e.reps || null, weight: e.weight || null }))
        }))},
        cardio: w.pm?.cardio || { type: "Run", distance: 2, time: null },
        metcon: w.pm?.metcon || { rounds: null, time: null, rpe: null, exercises: [] },
        notes: ((w.am?.notes || '') + (w.am?.notes && w.pm?.notes ? '\n\n' : '') + (w.pm?.notes || ''))
      })) };
    } catch(e) {}
  }
  return { workouts: [] };
}
function persistLocal() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
function persist() {
  persistLocal();
  if (syncEnabled && currentWorkout && !isEmpty(currentWorkout)) {
    syncWorkout(currentWorkout);
  }
}

// Push one workout to D1
async function syncWorkout(w) {
  try {
    const res = await fetch(apiUrl(`${API_BASE}/${w.date}`), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(w),
    });
    if (res.status === 401) { location.href = '/login.html'; return; }
    if (!res.ok) console.warn('Sync failed', await res.text());
  } catch (e) { console.warn('Sync error', e); }
}

async function pullFromCloud() {
  if (!syncEnabled) return;
  try {
    const res = await fetch(apiUrl(API_BASE));
    if (res.status === 401) { location.href = '/login.html'; return; }
    if (!res.ok) return;
    const { workouts } = await res.json();
    if (!workouts) return;
    // Replace local state with cloud state (since we're per-user now, no merging concerns)
    state.workouts = workouts.sort((a,b) => b.date.localeCompare(a.date));
    persistLocal();
    // Re-render in case current view changed
    if (currentDate) loadWorkoutForDate(currentDate, currentWorkout?.category || DAY_TO_CATEGORY[new Date(currentDate+'T12:00:00').getDay()]);
    if (currentView === 'week') renderWeek();
    if (currentView === 'month') renderMonth();
  } catch (e) {
    console.warn('Pull from cloud failed:', e);
  }
}

// On boot: check session, redirect if needed, set up impersonation if admin requested it
async function initAuth() {
  if (!syncEnabled) return true; // local file: skip auth
  try {
    const r = await fetch('/api/me');
    const { user } = await r.json();
    if (!user) { location.href = '/login.html'; return false; }
    currentUserObj = user;
    // Check for ?asUser= impersonation
    const url = new URL(location.href);
    const requestedAsUser = url.searchParams.get('asUser');
    if (requestedAsUser && user.isAdmin) {
      asUserId = parseInt(requestedAsUser);
      // Get the target user's name
      const ru = await fetch('/api/users');
      if (ru.ok) {
        const { users } = await ru.json();
        viewingUserObj = users.find(u => u.id === asUserId);
      }
    } else {
      viewingUserObj = user;
    }
    // Load user prefs (favorites/hidden) and custom exercises in parallel
    Promise.all([
      fetch('/api/exercise-prefs').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/api/custom-exercises').then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([prefs, customs]) => {
      if (prefs) {
        userPrefs.favorites = new Set(prefs.favorites || []);
        userPrefs.hidden = new Set(prefs.hidden || []);
      }
      if (customs) userCustomExercises = customs.exercises || [];
    });
    // Render user name in header
    document.getElementById('userBadge').innerHTML = renderUserBadge();
    return true;
  } catch (e) {
    console.error('Auth check failed:', e);
    return false;
  }
}

// Helper: get the merged exercise list for a category+phase (defaults + customs - hidden)
function getMergedExercises(category, phase) {
  const defaults = POOL[category]?.[phase] || [];
  const customs = userCustomExercises.filter(c => c.category === category && c.phase === phase).map(c => c.name);
  const merged = [...new Set([...defaults, ...customs])];
  return merged;
}

function renderUserBadge() {
  if (!currentUserObj) return '';
  const isImpersonating = asUserId && asUserId !== currentUserObj.id;
  if (isImpersonating && viewingUserObj) {
    return `<div class="user-badge impersonating" title="Click to exit impersonation" onclick="exitImpersonation()">
      <span class="badge-label">Logging as</span> ${escapeHtml(viewingUserObj.name)} <span class="badge-x">✕</span>
    </div>`;
  }
  return `<div class="user-badge" title="${escapeHtml(currentUserObj.username)}">${escapeHtml(currentUserObj.name)}</div>`;
}
function exitImpersonation() {
  location.href = '/admin.html';
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  localStorage.removeItem(STATE_KEY);
  location.href = '/login.html';
}

// ============================================================
// VIEW STATE
// ============================================================
let currentView = 'day';
let currentDate = null;
let currentWeekOffset = 0;
let currentMonthOffset = 0;
let currentWorkout = null;

function setView(v) {
  currentView = v;
  document.getElementById('dayViewBtn').classList.toggle('active', v === 'day');
  document.getElementById('weekViewBtn').classList.toggle('active', v === 'week');
  document.getElementById('monthViewBtn').classList.toggle('active', v === 'month');
  document.getElementById('dayView').style.display = v === 'day' ? 'block' : 'none';
  document.getElementById('weekView').style.display = v === 'week' ? 'block' : 'none';
  document.getElementById('monthView').style.display = v === 'month' ? 'block' : 'none';
  if (v === 'week') renderWeek();
  if (v === 'month') renderMonth();
}

// ============================================================
// DAY
// ============================================================
function setDate(dateStr) {
  currentDate = dateStr;
  const d = new Date(dateStr + 'T12:00:00');
  document.getElementById('dayLabel').textContent = FULL_DAY_NAMES[d.getDay()].toUpperCase();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('entryDate').value = dateStr;
  loadWorkoutForDate(dateStr, DAY_TO_CATEGORY[d.getDay()]);
}
function loadWorkoutForDate(dateStr, defaultCat) {
  currentWorkout = state.workouts.find(w => w.date === dateStr) || {
    date: dateStr, category: defaultCat,
    bodyWeight: null, sleep: null, energy: null,
    am: { exercises: [] },
    cardio: { type: "Run", distance: 2, time: null },
    metcon: { rounds: null, time: null, rpe: null, exercises: [] },
    notes: ''
  };
  renderAll();
}
function shiftDay(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  setDate(d.toISOString().slice(0, 10));
}
function setCategory(cat) {
  currentWorkout.category = cat;
  document.getElementById('categoryPill').textContent = cat.toUpperCase();
  autoSave();
}
function onDateChange() { setDate(document.getElementById('entryDate').value); finishDateEdit(); }
function editDate() { document.getElementById('dateInfo').classList.add('editing'); document.getElementById('entryDate').focus(); }
function finishDateEdit() { document.getElementById('dateInfo').classList.remove('editing'); }

// ============================================================
// RENDERING
// ============================================================
function renderAll() {
  document.getElementById('categoryPill').textContent = currentWorkout.category.toUpperCase();
  renderAMList();
  renderMetconList();
  document.getElementById('cardioType').value = currentWorkout.cardio?.type || 'Run';
  document.getElementById('cardioDist').value = currentWorkout.cardio?.distance ?? 2;
  document.getElementById('cardioTime').value = currentWorkout.cardio?.time ?? '';
  document.getElementById('metconRounds').value = currentWorkout.metcon?.rounds ?? '';
  document.getElementById('metconTime').value = currentWorkout.metcon?.time ?? '';
  document.getElementById('metconRPE').value = currentWorkout.metcon?.rpe ?? '';
  document.getElementById('bodyWeight').value = currentWorkout.bodyWeight ?? '';
  document.getElementById('sleep').value = currentWorkout.sleep ?? '';
  document.getElementById('energy').value = currentWorkout.energy ?? '';
  document.getElementById('dayNotes').value = currentWorkout.notes || '';
}

function renderAMList() {
  const c = document.getElementById('amList');
  if (!currentWorkout.am.exercises.length) { c.innerHTML = ''; return; }
  c.innerHTML = currentWorkout.am.exercises.map((ex, exIdx) => {
    const last = findLastHint(ex.name);
    return `
      <div class="exercise-card">
        <div class="exercise-head">
          <div class="exercise-name">${escapeHtml(ex.name)}</div>
          <button class="exercise-menu" onclick="removeExercise(${exIdx})" title="Remove">remove</button>
        </div>
        ${last ? `<div class="last-hint">Last time: <b>${last}</b></div>` : ''}
        <div class="sets-list">
          <div class="sets-header"><div>SET</div><div>REPS</div><div>WEIGHT</div><div></div></div>

            <div class="set-row">
              <div class="set-num">${sIdx + 1}</div>
              <input type="number" inputmode="numeric" value="${s.reps ?? ''}" placeholder="reps"
                     onchange="updateSet(${exIdx}, ${sIdx}, 'reps', this.value)" />
              <input type="number" inputmode="decimal" step="2.5" value="${s.weight ?? ''}" placeholder="lbs"
                     onchange="updateSet(${exIdx}, ${sIdx}, 'weight', this.value)" />
              <button class="set-del" onclick="removeSet(${exIdx}, ${sIdx})">✕</button>
            </div>
          `).join('')}

}

function renderMetconList() {
  const c = document.getElementById('metconList');
  if (!currentWorkout.metcon.exercises.length) {
    c.innerHTML = `<div style="color: var(--muted); font-size: 13px; padding: 10px 0; text-align: center;">No movements yet.</div>`;

// ============================================================
// MUTATIONS
// ============================================================
function addExercise(name, section) {
  if (section === 'am') {
    const last = findLastSession(name);
    const fs = last ? { reps: last.sets[0].reps, weight: last.sets[0].weight } : { reps: null, weight: null };
    currentWorkout.am.exercises.push({ name, sets: [{...fs},{...fs},{...fs}] });
    renderAMList();
  } else {
    currentWorkout.metcon.exercises.push({ name, reps: null });
    renderMetconList();
  }
  autoSave();
}
function updateSet(ei, si, f, v) {
  currentWorkout.am.exercises[ei].sets[si][f] = v === '' ? null : parseFloat(v);
  autoSave();
}
function addSet(ei) {
  const ex = currentWorkout.am.exercises[ei];
  const l = ex.sets[ex.sets.length-1] || {reps:null, weight:null};
  ex.sets.push({reps: l.reps, weight: l.weight});
  renderAMList();
  autoSave();
}
function removeSet(ei, si) {
  currentWorkout.am.exercises[ei].sets.splice(si, 1);
  if (!currentWorkout.am.exercises[ei].sets.length) currentWorkout.am.exercises.splice(ei, 1);
  renderAMList();
  autoSave();
}
function removeExercise(ei) {
  if (!confirm("Remove this exercise?")) return;
  currentWorkout.am.exercises.splice(ei, 1);
  renderAMList();
  autoSave();
}
function updateMetconReps(i, v) {
  currentWorkout.metcon.exercises[i].reps = v === '' ? null : parseInt(v);
  autoSave();
}
function removeMetcon(i) {
  currentWorkout.metcon.exercises.splice(i, 1);
  renderMetconList();
  autoSave();
}

// ============================================================
// LAST SESSION HINTS
// ============================================================
function findLastSession(name) {
  for (const w of state.workouts.filter(w => w.date !== currentDate).sort((a,b) => b.date.localeCompare(a.date))) {
    const f = (w.am?.exercises || []).find(e => e.name === name);
    if (f && f.sets?.length) return f;
  }
  return null;
}
function findLastHint(name) {
  const l = findLastSession(name);
  if (!l) return null;
  const s = l.sets[0];
  if (!s.reps && !s.weight) return null;
  return `${l.sets.length}×${s.reps ?? '?'}${s.weight ? ` @ ${s.weight}lbs` : ''}`;
}

// AUTO-SAVE
// ============================================================
let saveTimeout = null;
function autoSave() {
  currentWorkout.cardio = {
    type: document.getElementById('cardioType').value,
    distance: parseFloat(document.getElementById('cardioDist').value) || null,
    time: parseFloat(document.getElementById('cardioTime').value) || null
  };
  currentWorkout.metcon.rounds = parseInt(document.getElementById('metconRounds').value) || null;
  currentWorkout.metcon.time = parseFloat(document.getElementById('metconTime').value) || null;
  currentWorkout.metcon.rpe = parseInt(document.getElementById('metconRPE').value) || null;
  currentWorkout.bodyWeight = parseFloat(document.getElementById('bodyWeight').value) || null;
  currentWorkout.sleep = parseFloat(document.getElementById('sleep').value) || null;
  currentWorkout.energy = parseInt(document.getElementById('energy').value) || null;
  currentWorkout.notes = document.getElementById('dayNotes').value.trim();
  currentWorkout.savedAt = new Date().toISOString();
  if (!isEmpty(currentWorkout)) {
    const idx = state.workouts.findIndex(w => w.date === currentDate);
    if (idx >= 0) state.workouts[idx] = currentWorkout;
    else state.workouts.push(currentWorkout);
    state.workouts.sort((a,b) => b.date.localeCompare(a.date));
  }
  persist();
  showSavePill();
}
function isEmpty(w) {
  if (!w) return true;
  // If user manually picked a category different from the day's default, treat as touched
  const d = new Date(w.date + 'T12:00:00');
  const autoCat = DAY_TO_CATEGORY[d.getDay()];
  if (w.category && w.category !== autoCat) return false;
  return !w.am?.exercises?.length && !w.metcon?.exercises?.length
    && !w.cardio?.time && !w.notes && !w.bodyWeight;
}
function showSavePill() {
  const p = document.getElementById('savePill');
  p.classList.add('show');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => p.classList.remove('show'), 1200);
}

// ============================================================
// WEEK VIEW
// ============================================================
function shiftWeek(delta) { currentWeekOffset += delta; renderWeek(); }
function getWeekStart(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + (offset * 7)); // Monday
  d.setHours(0,0,0,0);
  return d;
}
function renderWeek() {
  const start = getWeekStart(currentWeekOffset);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  const sameMonth = start.getMonth() === end.getMonth();
  let title;
  if (currentWeekOffset === 0) title = 'This Week';
  else if (currentWeekOffset === -1) title = 'Last Week';
  else if (currentWeekOffset === 1) title = 'Next Week';
  else {
    const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    title = sameMonth ? `${fmt(start)} – ${end.getDate()}` : `${fmt(start)} – ${fmt(end)}`;
  }
  document.getElementById('weekTitle').textContent = title;

  const today = new Date().toISOString().slice(0,10);
  const grid = document.getElementById('weekGrid');
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    const w = state.workouts.find(w => w.date === dateStr);
    const isToday = dateStr === today;
    const cat = w?.category || DAY_TO_CATEGORY[d.getDay()];
    const lifts = w?.am?.exercises?.length || 0;
    const miles = w?.cardio?.distance || 0;
    const movements = w?.metcon?.exercises?.length || 0;
    const isEmpty = lifts === 0 && !miles && movements === 0;
    html += `
      <div class="week-day-card ${isToday ? 'today' : ''} ${isEmpty ? 'empty' : ''}" onclick="jumpToDay('${dateStr}')">
        <div class="row1">
          <div>
            <div class="dayname">${SHORT_DAY_NAMES[d.getDay()]}</div>
            <div class="dnum">${d.getDate()}</div>
          </div>
          <div class="category-mini">${cat}</div>
        </div>
        <div class="summary">
          ${isEmpty ? 'no workout logged' : `
            ${lifts ? `<span><b>${lifts}</b> lifts</span>` : ''}
            ${miles ? `<span><b>${miles}</b>mi</span>` : ''}
            ${movements ? `<span><b>${movements}</b> metcon</span>` : ''}
          `}
        </div>
      </div>
    `;
  }
  grid.innerHTML = html;
}
function jumpToDay(dateStr) {
  setDate(dateStr);
  setView('day');
}

// ============================================================
// MONTH VIEW
// ============================================================
function shiftMonth(delta) { currentMonthOffset += delta; renderMonth(); }
function renderMonth() {
  const now = new Date();
  const monthDate = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const monthName = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  let title;
  if (currentMonthOffset === 0) title = `${monthName.split(' ')[0]} (this month)`;
  else if (currentMonthOffset === -1) title = `${monthName.split(' ')[0]} (last)`;
  else title = monthName;
  document.getElementById('monthTitle').textContent = title;

  // Grid starts on Monday. First-day-of-month → calculate offset
  const firstOfMonth = new Date(year, month, 1);
  const firstDay = firstOfMonth.getDay(); // 0=Sun ... 6=Sat
  const mondayOffset = (firstDay + 6) % 7; // 0 if Mon, 6 if Sun
  const gridStart = new Date(year, month, 1 - mondayOffset);

  // 6 rows × 7 cols = 42 cells
  const today = new Date().toISOString().slice(0, 10);
  const grid = document.getElementById('monthGrid');
  let html = '';
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    const isCurrentMonth = d.getMonth() === month;
    const isToday = dateStr === today;
    const w = state.workouts.find(w => w.date === dateStr);
    const cat = w?.category || (isCurrentMonth ? DAY_TO_CATEGORY[d.getDay()] : '');
    const hasLift = w?.am?.exercises?.length > 0;
    const hasCardio = w?.cardio?.time > 0 || w?.cardio?.distance > 0;
    const hasMetcon = w?.metcon?.exercises?.length > 0;
    const hasAny = hasLift || hasCardio || hasMetcon;

    const classes = ['month-cell'];
    if (!isCurrentMonth) classes.push('other-month');
    if (isToday) classes.push('today');
    if (hasAny && isCurrentMonth) classes.push('has-data');

    html += `<div class="${classes.join(' ')}" onclick="jumpToDay('${dateStr}')">
      <div>
        <div class="month-cell-day">${d.getDate()}</div>
        ${isCurrentMonth && cat ? `<div class="month-cell-cat">${shortCat(cat)}</div>` : ''}
      </div>
      ${hasAny ? `<div class="month-cell-dots">
        ${hasLift ? '<span class="dot dot-lift"></span>' : ''}
        ${hasCardio ? '<span class="dot dot-cardio"></span>' : ''}
        ${hasMetcon ? '<span class="dot dot-metcon"></span>' : ''}
      </div>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
}
function shortCat(cat) {
  return ({ 'Chest/Tri':'Chest', 'Back/Bi':'Back', 'Shoulders':'Shldr', 'Abs':'Abs', 'Legs':'Legs' })[cat] || cat;
}

function renderPickerChips() {

  const cat = currentWorkout.category;
  const favCount = userPrefs.favorites.size;
  const starsChip = favCount > 0
    ? `<button class="chip ${pickerFilter==='stars'?'active':''}" onclick="setPF('stars')">★ Stars (${favCount})</button>`
    : '';
  if (sec === 'am') {
    return `<div class="chips">
      <button class="chip ${pickerFilter==='current'?'active':''}" onclick="setPF('current')">${cat}</button>
      ${starsChip}
      <button class="chip ${pickerFilter==='all'?'active':''}" onclick="setPF('all')">All Categories</button>
    </div>`;
  }
  return `<div class="chips">
    <button class="chip ${pickerFilter==='current'?'active':''}" onclick="setPF('current')">${cat}</button>
    ${starsChip}
    <button class="chip ${pickerFilter==='universal'?'active':''}" onclick="setPF('universal')">Cardio</button>

function setPF(f) {
  pickerFilter = f;
  document.getElementById('modalChips').innerHTML = renderPickerChips();
  document.getElementById('modalBody').innerHTML = renderPickerList();
}
function renderPickerList() {
  const sec = modalContext.args[0];
  const phase = sec === 'am' ? 'am' : 'pm';
  const q = (document.getElementById('modalSearchInput')?.value || '').toLowerCase().trim();
  const cat = currentWorkout.category;
  const groups = [];

  if (pickerFilter === 'stars') {
    // Favorites view — show ONLY starred exercises, filtered to current phase (am/pm)
    // Group them by category for clarity
    const favsByCategory = {};
    [...userPrefs.favorites].forEach(name => {
      // Find which category+phase this exercise belongs to
      let found = null;
      for (const c of CATEGORY_LIST) {
        if (POOL[c].am.includes(name)) { found = { c, ph: 'am' }; break; }
        if (POOL[c].pm.includes(name)) { found = { c, ph: 'pm' }; break; }
      }
      if (!found) {
        const custom = userCustomExercises.find(x => x.name === name);
        if (custom) found = { c: custom.category, ph: custom.phase };
      }
      if (!found) found = { c: 'Universal', ph: phase };
      if (found.ph !== phase) return; // only show favorites matching the current section
      (favsByCategory[found.c] = favsByCategory[found.c] || []).push(name);
    });
    // Put current day's category first
    const order = [cat, ...CATEGORY_LIST.filter(c => c !== cat), 'Universal'];
    order.forEach(c => {
      if (favsByCategory[c]?.length) groups.push(['★ ' + c, favsByCategory[c]]);
    });
  } else if (sec === 'am') {
    if (pickerFilter === 'current') groups.push([cat, getMergedExercises(cat, 'am')]);
    else CATEGORY_LIST.forEach(c => groups.push([c, getMergedExercises(c, 'am')]));
  } else {
    if (pickerFilter === 'current') groups.push([cat + ' supplement', getMergedExercises(cat, 'pm')]);
    else if (pickerFilter === 'universal') groups.push(['Cardio + Full Body', getMergedExercises('Universal', 'pm')]);
    else {
      CATEGORY_LIST.forEach(c => groups.push([c + ' supplement', getMergedExercises(c, 'pm')]));
      groups.push(['Cardio + Full Body', getMergedExercises('Universal', 'pm')]);
    }
  }

  let html = '';
  groups.forEach(([gn, list]) => {
    // Filter by search, then drop hidden (unless filter=stars), then sort favorites to top
    let f = list.filter(e => !q || e.toLowerCase().includes(q));
    if (pickerFilter !== 'stars') f = f.filter(e => !userPrefs.hidden.has(e));
    f.sort((a, b) => {
      const af = userPrefs.favorites.has(a), bf = userPrefs.favorites.has(b);
      if (af !== bf) return af ? -1 : 1;
      return a.localeCompare(b);
    });
    if (!f.length) return;
    html += `<div class="group-label">${gn}</div>`;
    html += f.map(n => {
      const isFav = userPrefs.favorites.has(n);
      return `
        <div class="exercise-pick" onclick="addExercise(${JSON.stringify(n).replace(/'/g, "\\'")}, '${sec}'); closeModal();">
          <div class="name">${isFav ? '<span style="color:var(--gold,#F2B340);margin-right:6px;">★</span>' : ''}${escapeHtml(n)}</div>
          <div class="add-icon">+</div>
        </div>`;
    }).join('');
  });
  if (!html) html = `<div class="empty">No matches for "${escapeHtml(q)}"</div>`;
  return html;
}

  return [['Monday','Chest/Tri','Push day'],['Tuesday','Back/Bi','Pull day'],['Wednesday','Shoulders','Press day'],['Thursday','Abs','Core (variable)'],['Friday','Legs','Squat / hinge']].map(([d, c, f]) => `
    <div style="padding: 18px 20px; border-bottom: 1px solid var(--border-soft);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
        <div style="font-weight: 800; font-size: 16px;">${d}</div>
        <div style="background: var(--accent-soft); color: var(--accent); padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;">${c}</div>
      </div>
      <div style="color: var(--text-2); font-size: 13px;">${f} — AM strength → PM 2mi cardio + supplement metcon</div>
    </div>
  `).join('');
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workout-journal-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  closeModal();
}
function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const i = JSON.parse(r.result);
      if (!i.workouts) throw new Error("Missing workouts field");
      if (!confirm(`Import ${i.workouts.length} workouts? This REPLACES current data.`)) return;
      state = i; persist();
      setDate(currentDate); closeModal();
      alert("Imported.");
    } catch(err) { alert("Failed: " + err.message); }
  };
  r.readAsText(file);
}
function clearAll() {
  if (!confirm("Delete ALL workout history? Cannot be undone.")) return;
  if (!confirm("Really? Every workout, gone.")) return;
  state = { workouts: [] }; persist(); setDate(currentDate); closeModal();
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

window.addEventListener('DOMContentLoaded', async () => {
  // Support deep-link to a specific date via ?date= (used after applying a routine)
  const url = new URL(location.href);
  const dateParam = url.searchParams.get('date');
  setDate(dateParam || new Date().toISOString().slice(0, 10));
  const ok = await initAuth();
  if (!ok) return;
  pullFromCloud();
});
</script>
