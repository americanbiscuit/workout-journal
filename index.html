<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF7F2" />
<title>Workout Journal</title>
<style>
  :root {
    --bg: #F1EBDF;             /* softer warm sand, less bright than pure cream */
    --surface: #F8F4EC;        /* soft warm white for cards, not stark */
    --surface-alt: #E8E0D0;    /* warm beige for inputs */
    --surface-2: #FCF9F2;
    --border: #DBD2BF;
    --border-soft: #E6DCC7;
    --text: #2D2A26;
    --text-2: #6B6660;
    --muted: #A39E97;
    --accent: #FF7A55;
    --accent-soft: #FFE9DF;
    --accent-2: #5DAA80;
    --accent-2-soft: #DCEFE2;
    --warn: #E8A957;
    --danger: #DC6E6E;
    /* Dark header palette */
    --header-bg: #1F1B17;      /* deep warm near-black */
    --header-text: #F1EBDF;
    --header-text-2: #B0A89A;
    --header-border: #2F2A24;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(45, 42, 38, 0.06);
    --shadow-md: 0 4px 16px rgba(45, 42, 38, 0.08);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Inter", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: calc(100px + var(--safe-bottom));
  }
  button { font-family: inherit; }
  input, select, textarea {
    font-family: inherit;
    font-size: 16px;   /* 16px prevents iOS Safari auto-zoom on input focus */
  }
  /* Mobile touch behavior: kill the blue tap-highlight overlay iOS/Android show;
     touch-action: manipulation disables the 300ms double-tap-to-zoom delay on
     interactive elements. Both no-ops on desktop. */
  * { -webkit-tap-highlight-color: transparent; }
  button, a, input, select, textarea, .exercise-pick, .menu-item, .set-row, .week-day-card, .month-cell {
    touch-action: manipulation;
  }

  /* ============ HEADER (dark) ============ */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--header-bg);
    color: var(--header-text);
    border-bottom: 1px solid var(--header-border);
    /* Respect safe-area insets on notched phones: notch-clear top + edge-clear left/right */
    padding: calc(18px + env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 18px max(20px, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .logo {
    font-size: 20px;
    font-weight: 800;
    color: var(--header-text);
    letter-spacing: -0.5px;
  }
  .logo .dot {
    color: var(--accent);
  }
  .header-actions { display: flex; gap: 6px; flex-shrink: 0; }
  /* Logo + hamburger button must NEVER be squeezed off-screen. View toggle is
     the flexible middle that shrinks first on narrow phones. */
  .logo { flex-shrink: 0; }
  .icon-btn { flex-shrink: 0; }
  .icon-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--header-border);
    color: var(--header-text-2);
    width: 40px;
    height: 40px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--header-text); border-color: var(--accent); background: rgba(255, 122, 85, 0.15); }
  .icon-btn:active { transform: scale(0.95); }
  .user-badge {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--header-border);
    color: var(--header-text-2);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .user-badge.impersonating {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    cursor: pointer;
  }
  .user-badge .badge-label {
    font-size: 9px;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .user-badge .badge-x {
    margin-left: 4px;
    font-weight: 700;
    opacity: 0.85;
  }

  /* ============ VIEW TOGGLE (in dark header) ============ */
  .view-toggle {
    display: inline-flex;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    padding: 4px;
    gap: 0;
  }
  .view-toggle button {
    background: transparent;
    border: none;
    color: var(--header-text-2);
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.18s;
  }
  .view-toggle button.active {
    background: var(--header-text);
    color: var(--header-bg);
    box-shadow: var(--shadow-sm);
  }

  /* ============ MAIN ============ */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 0;
  }

  /* ============ DAY HEADER (in day view) ============ */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 12px;
  }
  .day-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .day-nav:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .date-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .date-info .day-name {
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .date-info .date-text {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .date-info input[type="date"] {
    border: none;
    background: transparent;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    padding: 0;
    display: none;
  }
  .date-info.editing .date-text { display: none; }
  .date-info.editing input[type="date"] { display: block; }

  .category-pill {
    background: var(--accent);
    color: white;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(255, 122, 85, 0.25);
  }
  .category-pill:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(255, 122, 85, 0.35); }

  /* ============ SECTIONS ============ */
  .section {
    margin-bottom: 28px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    font-weight: 800;
    color: var(--text-2);
  }
  .section-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* ============ EXERCISE CARDS ============ */
  /* Rest-between-sets field + Superset grouping */
  .rest-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-2);
  }
  .rest-row label { text-transform: uppercase; letter-spacing: 1px; font-weight: 700; font-size: 10px; margin: 0; color: var(--muted); }
  .rest-row input {
    width: 64px;
    background: transparent;
    border: 1px solid var(--border-soft);
    padding: 4px 8px;
    border-radius: 6px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }
  .rest-row .rest-unit { color: var(--muted); font-size: 11px; margin-left: -4px; }
  .rest-row .group-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border-soft);
    color: var(--text-2);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .rest-row .group-btn.on { background: var(--accent); color: white; border-color: var(--accent); }
  .rest-row .group-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rest-row .group-btn.on:hover { background: var(--accent); color: white; }
  /* Superset visual: cards in a group get a shared accent left border + no gap between */
  .exercise-card.grouped { border-left: 3px solid var(--accent); }
  .exercise-card.grouped-not-first { margin-top: -12px; border-top-left-radius: 0; border-top-right-radius: 0; }
  .exercise-card.grouped-not-last { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .superset-chip {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .exercise-card:hover { box-shadow: var(--shadow-md); }
  .exercise-head {
    padding: 16px 18px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .exercise-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .exercise-menu {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .exercise-menu:hover { color: var(--danger); background: rgba(220, 110, 110, 0.08); }
  .exercise-head-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .star-toggle {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 18px;
    line-height: 1;
    transition: all 0.15s;
  }
  .star-toggle:hover { color: #F2B340; background: rgba(242, 179, 64, 0.1); }
  .star-toggle.on { color: #F2B340; }
  .last-hint {
    color: var(--text-2);
    font-size: 12px;
    padding: 0 18px 10px;
  }
  .last-hint b { color: var(--accent-2); font-weight: 700; }

  .sets-list { padding: 0 18px 14px; }
  .sets-header {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 32px;
    gap: 10px;
    padding: 10px 0 8px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    border-bottom: 1px solid var(--border-soft);
  }
  .sets-header div:nth-child(1) { text-align: center; }
  .set-row {
    display: grid;
    /* minmax(0, 1fr) so grid items can shrink below their content width — without
       this the input placeholders forced the row wider than the viewport on phones. */
    grid-template-columns: 40px minmax(0, 1fr) minmax(0, 1fr) 32px;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .set-row:last-of-type { border-bottom: none; }
  .set-num {
    background: var(--surface-alt);
    border-radius: 8px;
    text-align: center;
    font-weight: 700;
    color: var(--text-2);
    font-size: 13px;
    padding: 9px 0;
  }
  .set-row input {
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    text-align: center;
    font-weight: 700;
    width: 100%;
    transition: all 0.15s;
  }
  .set-row input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .set-row input::placeholder { color: var(--muted); font-weight: 500; }
  .set-del {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
  }
  .set-del:hover { color: var(--danger); background: rgba(220, 110, 110, 0.08); }
  .add-set-btn {
    width: 100%;
    background: var(--surface-alt);
    border: none;
    color: var(--text-2);
    padding: 12px;
    border-radius: var(--radius-sm);
    margin-top: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .add-set-btn:hover { background: var(--accent-soft); color: var(--accent); }

  .add-exercise-btn {
    width: 100%;
    background: var(--surface);
    border: 2px dashed var(--border);
    color: var(--text-2);
    padding: 18px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .add-exercise-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .add-exercise-btn:active { transform: translateY(0); }

  /* ============ PM CARDS ============ */
  .pm-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .pm-row {
    display: grid;
    gap: 12px;
  }
  /* minmax(0, 1fr) prevents grid items from stretching past viewport on phones
     when their content (input placeholders, long labels) is wider than 1fr. */
  .pm-row.two { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
  .pm-row.three { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr); }
  .input-group { display: flex; flex-direction: column; min-width: 0; }
  .input-group input, .input-group select { min-width: 0; width: 100%; }
  .set-row input { min-width: 0; }
  /* Belt-and-suspenders: no input/textarea should EVER exceed its parent width. */
  input, select, textarea { max-width: 100%; }
  .input-group label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .input-group input, .input-group select {
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    text-align: center;
    transition: all 0.15s;
  }
  .input-group input:focus, .input-group select:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .input-group input::placeholder { color: var(--muted); font-weight: 500; }
  .input-group select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-2) 50%), linear-gradient(135deg, var(--text-2) 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 32px;
    text-align: left;
  }

  .metcon-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 90px 32px;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .metcon-row:last-of-type { border-bottom: none; }
  .metcon-row input {
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-weight: 700;
  }
  .metcon-row input[type="number"] { text-align: center; }
  .metcon-row input:focus { outline: none; border-color: var(--accent); background: white; }

  /* ============ COLLAPSE (notes) ============ */
  details.collapse {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  details.collapse summary {
    cursor: pointer;
    padding: 16px 18px;
    list-style: none;
    color: var(--text-2);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.collapse summary::-webkit-details-marker { display: none; }
  details.collapse summary::after {
    content: "+";
    color: var(--muted);
    font-size: 18px;
    font-weight: 600;
    transition: transform 0.2s;
  }
  details.collapse[open] summary::after { transform: rotate(45deg); }
  details.collapse .collapse-body { padding: 0 18px 18px; }
  details.collapse textarea {
    width: 100%;
    background: var(--surface-alt);
    border: 1.5px solid transparent;
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    resize: vertical;
    min-height: 90px;
    font-size: 15px;
    transition: all 0.15s;
    margin-top: 12px;
  }
  details.collapse textarea:focus { outline: none; border-color: var(--accent); background: white; }

  /* ============ WEEK VIEW ============ */
  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .week-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .week-nav { display: flex; gap: 6px; }
  .week-grid {
    display: grid;
    gap: 10px;
  }
  .week-day-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .week-day-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .week-day-card.today {
    border: 2px solid var(--accent);
    background: linear-gradient(135deg, var(--surface), var(--accent-soft));
  }
  .week-day-card .row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .week-day-card .dayname {
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .week-day-card.today .dayname { color: var(--accent); }
  .week-day-card .dnum {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .week-day-card .category-mini {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .week-day-card .summary {
    color: var(--text-2);
    font-size: 13px;
    margin-top: 8px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .week-day-card .summary span { white-space: nowrap; }
  .week-day-card .summary b { color: var(--text); font-weight: 700; }
  .week-day-card.empty .summary { color: var(--muted); font-style: italic; }

  /* ============ MONTH VIEW ============ */
  .month-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .month-weekdays span {
    text-align: center;
    font-size: 10px;
    color: var(--text-2);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .month-cell {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 6px 6px 8px;
    min-height: 64px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.15s;
  }
  .month-cell:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .month-cell.other-month {
    background: transparent;
    border-color: transparent;
    opacity: 0.35;
  }
  .month-cell.today {
    border: 2px solid var(--accent);
    background: var(--accent-soft);
  }
  .month-cell.has-data {
    background: var(--surface-2);
    border-color: var(--border);
  }
  .month-cell-day {

    border: none;
    color: var(--text);

    font-size: 14px;

<body>

<header>
  <div class="logo">Journal<span class="dot">.</span></div>
  <div class="view-toggle">
    <button id="dayViewBtn" class="active" onclick="setView('day')">Day</button>
    <button id="weekViewBtn" onclick="setView('week')">Week</button>
    <button id="monthViewBtn" onclick="setView('month')">Month</button>
  </div>
  <div class="header-actions">
    <div id="userBadge"></div>
    <button class="icon-btn" onclick="openModal('settings')" title="Menu">≡</button>
  </div>
</header>

<main>

  <!-- DAY VIEW -->
  <div id="dayView">
    <div class="day-header">
      <div class="day-header-left">
        <button class="day-nav" onclick="shiftDay(-1)">‹</button>
        <div class="date-info" id="dateInfo">
          <div class="day-name" id="dayLabel">FRIDAY</div>
          <div class="date-text" id="dateDisplay" onclick="editDate()">Jun 30</div>
          <input type="date" id="entryDate" onchange="onDateChange()" onblur="finishDateEdit()" />
        </div>
        <button class="day-nav" onclick="shiftDay(1)">›</button>
      </div>
      <!-- Category chip comes from the resolved template's `category` field (set in
           Menu → Day Layouts → template editor). Hidden when no template has one. -->
      <div class="category-pill" id="categoryPill" style="display:none;"></div>
    </div>

    <!-- Template pill: shows which template is active for this date (from schedule → weekly map → template) -->
    <div id="templatePill" style="display:none; margin: 0 auto 14px; text-align:center; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700;">
      <span id="templatePillText"></span> · <a href="/templates.html" style="color: var(--accent);">Customize</a>
    </div>

    <!-- Dynamic sections rendered from the resolved template -->
    <div id="daySections"></div>

    <!-- VITALS + NOTES (always shown, universal across all templates) -->
    <details class="collapse" style="margin-top: 24px">
      <summary>Vitals + Notes</summary>
      <div class="collapse-body">
        <div class="pm-row three" style="margin-top: 12px">
          <div class="input-group">
            <label>Body Wt</label>
            <input type="number" inputmode="decimal" id="bodyWeight" placeholder="—" oninput="autoSaveDebounced()" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>Sleep (hr)</label>
            <input type="number" inputmode="decimal" step="0.5" id="sleep" placeholder="—" oninput="autoSaveDebounced()" onchange="autoSave()" />
          </div>
          <div class="input-group">
            <label>Energy /10</label>
            <input type="number" inputmode="numeric" min="1" max="10" id="energy" placeholder="—" oninput="autoSaveDebounced()" onchange="autoSave()" />
          </div>
        </div>
        <textarea id="dayNotes" placeholder="How'd it go? Anything to remember next time?" oninput="autoSaveDebounced()" onchange="autoSave()"></textarea>
      </div>
    </details>
  </div>

  <!-- WEEK VIEW -->
  <div id="weekView" style="display:none">
    <div class="week-header">
      <button class="day-nav" onclick="shiftWeek(-1)">‹</button>
      <div class="week-title" id="weekTitle">This Week</div>
      <button class="day-nav" onclick="shiftWeek(1)">›</button>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- MONTH VIEW -->
  <div id="monthView" style="display:none">
    <div class="week-header">
      <button class="day-nav" onclick="shiftMonth(-1)">‹</button>
      <div class="week-title" id="monthTitle">This Month</div>
      <button class="day-nav" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="month-weekdays">
      <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
    </div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="month-legend">
      <span class="leg-dot leg-lift"></span> lift
      <span class="leg-dot leg-cardio"></span> cardio
      <span class="leg-dot leg-metcon"></span> metcon
    </div>
  </div>

</main>

<!-- SAVE PILL -->
<div class="save-pill" id="savePill">Saved</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <div class="modal-title" id="modalTitle">Title</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modalSearch"></div>
    </div>
    <div id="modalChips"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

// Which muscle groups show up in the picker for each day category.
// full_body is included in every category so cardio/carries/plyos are always accessible.
const CATEGORY_MUSCLES = {
  "Chest/Tri": ['chest', 'triceps', 'full_body'],
  "Back/Bi":   ['back', 'biceps', 'full_body'],
  "Shoulders": ['shoulders', 'full_body'],

const MUSCLE_LABEL = {
  chest: 'Chest',
  back: 'Back',
  biceps: 'Biceps',
  triceps: 'Triceps',
  shoulders: 'Shoulders',
  quads: 'Quads',
  hamstrings: 'Hamstrings & Glutes',
  calves: 'Calves',

  full_body: 'Full Body / Supporting',
};

// Order muscle groups appear in the picker + pool page
const MUSCLE_ORDER = ['chest', 'back', 'biceps', 'triceps', 'shoulders', 'quads', 'hamstrings', 'calves', 'abs', 'full_body'];

const DAY_TO_CATEGORY = { 0: "Abs", 1: "Chest/Tri", 2: "Back/Bi", 3: "Shoulders", 4: "Abs", 5: "Legs", 6: "Abs" };
const FULL_DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT_DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
// Category is a property of the day template now (Menu → Day Layouts).
// This list is kept only as a fallback for old workouts whose stored category
// doesn't match any template's category yet.
const CATEGORY_LIST = ["Chest/Tri","Back/Bi","Shoulders","Abs","Legs"];

// ============================================================
// AUTH + STATE — D1-backed with session cookie
// ============================================================
const STATE_KEY = 'workout-journal-v2';
const LEGACY_KEY = 'workout-journal-v1';
let API_BASE = '/api/workouts';  // gets ?asUser= appended for admin impersonation
let asUserId = null;             // admin impersonation target
let currentUserObj = null;       // current logged-in user (admin if impersonating)
let viewingUserObj = null;       // user whose workouts we're showing (= currentUserObj unless impersonating)
let userPrefs = { favorites: new Set(), hidden: new Set() };  // exercise prefs (star/hide)
let userCustomExercises = [];    // user's custom-added exercises (merge with POOL)

let state = loadLocal();
let syncEnabled = location.hostname !== '' && location.protocol !== 'file:';

function apiUrl(path) {
  // Append ?asUser= when admin is impersonating
  if (asUserId) {
    const sep = path.includes('?') ? '&' : '?';
    return path + sep + 'asUser=' + asUserId;
  }
  return path;
}

function loadLocal() {
  const v2 = localStorage.getItem(STATE_KEY);
  if (v2) return JSON.parse(v2);
  const v1 = localStorage.getItem(LEGACY_KEY);
  if (v1) {
    try {
      const old = JSON.parse(v1);
      return { workouts: (old.workouts || []).map(w => ({
        date: w.date, category: w.category,
        bodyWeight: w.bodyWeight, sleep: w.sleep, energy: w.energy,
        am: { exercises: (w.am?.exercises || []).map(e => ({
          name: e.name,
          sets: Array.from({length: e.sets || 1}, () => ({ reps: e.reps || null, weight: e.weight || null }))
        }))},
        cardio: w.pm?.cardio || { type: "Run", distance: 2, time: null },
        metcon: w.pm?.metcon || { rounds: null, time: null, rpe: null, exercises: [] },
        notes: ((w.am?.notes || '') + (w.am?.notes && w.pm?.notes ? '\n\n' : '') + (w.pm?.notes || ''))
      })) };
    } catch(e) {}
  }
  return { workouts: [] };
}
function persistLocal() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
function persist() {
  persistLocal();
  if (syncEnabled && currentWorkout && !isEmpty(currentWorkout)) {
    syncWorkout(currentWorkout);
  }
}

// Push one workout to D1
async function syncWorkout(w) {
  try {
    const res = await fetch(apiUrl(`${API_BASE}/${w.date}`), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(w),
    });
    if (res.status === 401) { location.href = '/login.html'; return; }
    if (!res.ok) console.warn('Sync failed', await res.text());
  } catch (e) { console.warn('Sync error', e); }
}

async function pullFromCloud() {
  if (!syncEnabled) return;
  try {
    const res = await fetch(apiUrl(API_BASE));
    if (res.status === 401) { location.href = '/login.html'; return; }
    if (!res.ok) return;
    const { workouts } = await res.json();
    if (!workouts) return;
    // Replace local state with cloud state (since we're per-user now, no merging concerns)
    state.workouts = workouts.sort((a,b) => b.date.localeCompare(a.date));
    persistLocal();
    // Re-render in case current view changed
    if (currentDate) loadWorkoutForDate(currentDate, currentWorkout?.category || DAY_TO_CATEGORY[new Date(currentDate+'T12:00:00').getDay()]);
    if (currentView === 'week') renderWeek();
    if (currentView === 'month') renderMonth();
  } catch (e) {
    console.warn('Pull from cloud failed:', e);
  }
}

// On boot: check session, redirect if needed, set up impersonation if admin requested it
async function initAuth() {
  if (!syncEnabled) return true; // local file: skip auth
  try {
    const r = await fetch('/api/me');
    const { user } = await r.json();
    if (!user) { location.href = '/login.html'; return false; }
    currentUserObj = user;
    // Check for ?asUser= impersonation
    const url = new URL(location.href);
    const requestedAsUser = url.searchParams.get('asUser');
    if (requestedAsUser && user.isAdmin) {
      asUserId = parseInt(requestedAsUser);
      // Get the target user's name
      const ru = await fetch('/api/users');
      if (ru.ok) {
        const { users } = await ru.json();
        viewingUserObj = users.find(u => u.id === asUserId);
      }
    } else {
      viewingUserObj = user;
    }
    // Load user prefs (favorites/hidden) and custom exercises in parallel
    Promise.all([
      fetch('/api/exercise-prefs').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/api/custom-exercises').then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([prefs, customs]) => {
      if (prefs) {
        userPrefs.favorites = new Set(prefs.favorites || []);
        userPrefs.hidden = new Set(prefs.hidden || []);
      }
      if (customs) userCustomExercises = customs.exercises || [];
    });
    // Render user name in header
    document.getElementById('userBadge').innerHTML = renderUserBadge();
    return true;
  } catch (e) {
    console.error('Auth check failed:', e);
    return false;
  }
}

// Merged exercises for a day category, grouped by muscle group.
// Returns [{muscle, label, exercises: [...]}, ...] preserving MUSCLE_ORDER.
// Sources: POOL[muscle] defaults + userCustomExercises where category matches
// the day category (legacy) OR one of the mapped muscle groups (new records).
function getMergedExercisesForCategory(category) {
  const muscles = CATEGORY_MUSCLES[category] || MUSCLE_ORDER;
  return muscles.map(muscle => {
    const defaults = POOL[muscle] || [];
    // Legacy: customs saved with category="Chest/Tri" etc. Show under the first muscle bucket.
    // New: customs saved with category=muscle group name.
    const customs = userCustomExercises
      .filter(c => c.category === muscle || (c.category === category && muscle === muscles[0]))
      .map(c => c.name);
    const exercises = [...new Set([...defaults, ...customs])];
    return { muscle, label: MUSCLE_LABEL[muscle] || muscle, exercises };
  }).filter(g => g.exercises.length > 0);
}

// Flat list of every exercise across POOL + customs (used for star-view / all-view)
function getAllExercisesGroupedByMuscle() {
  return MUSCLE_ORDER.map(muscle => {
    const defaults = POOL[muscle] || [];
    const customs = userCustomExercises.filter(c => c.category === muscle).map(c => c.name);
    const exercises = [...new Set([...defaults, ...customs])];
    return { muscle, label: MUSCLE_LABEL[muscle] || muscle, exercises };
  }).filter(g => g.exercises.length > 0);
}

// Refresh custom exercises from server — call before opening the picker so
// exercises added on pool.html show up immediately without a page reload.
async function refreshCustomExercises() {
  if (!syncEnabled) return;
  try {
    const r = await fetch('/api/custom-exercises');
    if (r.ok) {
      const d = await r.json();
      userCustomExercises = d.exercises || [];
    }
  } catch (e) {
    console.warn('Custom exercises refresh failed', e);
  }
}

function renderUserBadge() {
  if (!currentUserObj) return '';
  const isImpersonating = asUserId && asUserId !== currentUserObj.id;
  if (isImpersonating && viewingUserObj) {
    return `<div class="user-badge impersonating" title="Click to exit impersonation" onclick="exitImpersonation()">
      <span class="badge-label">Logging as</span> ${escapeHtml(viewingUserObj.name)} <span class="badge-x">✕</span>
    </div>`;
  }
  return `<div class="user-badge" title="${escapeHtml(currentUserObj.username)}">${escapeHtml(currentUserObj.name)}</div>`;
}
function exitImpersonation() {
  location.href = '/admin.html';
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  localStorage.removeItem(STATE_KEY);
  location.href = '/login.html';
}

function setDate(dateStr) {
  currentDate = dateStr;

  document.getElementById('dayLabel').textContent = FULL_DAY_NAMES[d.getDay()].toUpperCase();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

function loadWorkoutForDate(dateStr, defaultCat) {
  currentWorkout = state.workouts.find(w => w.date === dateStr) || {
    date: dateStr, category: defaultCat,
    bodyWeight: null, sleep: null, energy: null,
    am: { exercises: [] },
    cardio: { type: "Run", distance: 2, time: null },
    metcon: { rounds: null, time: null, rpe: null, exercises: [] },
    notes: ''
  };
  renderAll();
}
function shiftDay(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  setDate(d.toISOString().slice(0, 10));
}
function setCategory(cat) {

let currentTemplate = null;   // template resolved for currentDate
const DEFAULT_SECTION_TITLES = { strength: 'Strength', cardio: 'Cardio', metcon: 'Metcon', notes: 'Notes', custom: 'Notes' };

async function renderAll() {
  await renderDaySections();   // sets categoryPill from the resolved template's category

  document.getElementById('bodyWeight').value = currentWorkout.bodyWeight ?? '';
  document.getElementById('sleep').value = currentWorkout.sleep ?? '';
  document.getElementById('energy').value = currentWorkout.energy ?? '';
  document.getElementById('dayNotes').value = currentWorkout.notes || '';
}

async function renderDaySections() {
  // Resolve the template for currentDate
  try {
    const res = await fetch(`/api/resolve-day?date=${currentDate}`);
    const data = await res.json();
    currentTemplate = data.template;
  } catch (e) {
    console.warn('Template resolve failed', e);
    currentTemplate = null;
  }

  const pill = document.getElementById('templatePill');
  const pillTxt = document.getElementById('templatePillText');
  if (currentTemplate && !currentTemplate.is_generic) {
    pillTxt.textContent = `Layout: ${currentTemplate.name}`;
    pill.style.display = 'block';
  } else {
    pill.style.display = 'none';
  }

  // Category chip in the day header comes from the resolved template's category field.
  // No runtime toggle, no per-user list — set it in the template editor.
  const catPill = document.getElementById('categoryPill');
  const cat = currentTemplate?.category?.trim();
  if (cat) {
    catPill.textContent = cat.toUpperCase();
    catPill.style.display = '';
    currentWorkout.category = cat;   // keep the workout row in sync so historical views group correctly
  } else {
    catPill.style.display = 'none';
  }

  const container = document.getElementById('daySections');

  // No custom template (generic default) → use classic 3-section HTML with existing IDs
  // This preserves ALL existing behavior for users who haven't created a template.
  if (!currentTemplate || currentTemplate.is_generic || !currentTemplate.sections?.length) {
    container.innerHTML = classicSectionsHTML();
    renderAMList();
    renderMetconList();
    document.getElementById('cardioType').value = currentWorkout.cardio?.type || 'Run';
    document.getElementById('cardioDist').value = currentWorkout.cardio?.distance ?? 2;
    document.getElementById('cardioTime').value = currentWorkout.cardio?.time ?? '';
    document.getElementById('metconRounds').value = currentWorkout.metcon?.rounds ?? '';
    document.getElementById('metconTime').value = currentWorkout.metcon?.time ?? '';
    document.getElementById('metconRPE').value = currentWorkout.metcon?.rpe ?? '';
    return;
  }

  // Custom template → render dynamic sections
  if (!Array.isArray(currentWorkout.sections)) currentWorkout.sections = [];
  container.innerHTML = currentTemplate.sections.map((sec, i) => {
    const state = currentWorkout.sections[i]?.state || sectionDefaultState(sec.type);
    if (!currentWorkout.sections[i]) currentWorkout.sections[i] = { type: sec.type, state };
    else currentWorkout.sections[i].type = sec.type;
    return renderSectionShell(i, sec, currentWorkout.sections[i].state);
  }).join('');
  // Hydrate lists (strength exercises + metcon movements) after HTML is in the DOM.
  // Also size any notes/custom textareas to fit their initial content.
  currentTemplate.sections.forEach((sec, i) => {
    if (sec.type === 'strength') renderStrengthList(i);
    else if (sec.type === 'metcon') renderMetconMovementList(i);
    else if (sec.type === 'notes' || sec.type === 'custom') {
      const ta = document.getElementById(`sec-${i}-notes`);
      if (ta) autoGrow(ta);
    }
  });
}

function sectionDefaultState(type) {

  if (type === 'notes' || type === 'custom') return { text: '' };
  return {};
}

// Section-aware strength list render (used by custom templates)
function renderStrengthList(sIdx) {
  const c = document.getElementById(`sec-${sIdx}-list`);
  if (!c) return;
  const st = currentWorkout.sections[sIdx].state;
  if (!st.exercises?.length) { c.innerHTML = ''; return; }
  c.innerHTML = st.exercises.map((ex, exIdx) => renderExerciseCard(ex, exIdx, st.exercises, {
    onRest: `updateSectionRest(${sIdx}, ${exIdx}, this.value)`,
    onGroup: `toggleSectionGroup(${sIdx}, ${exIdx})`,
    onRemove: `removeExerciseFromSection(${sIdx}, ${exIdx})`,
    onSetChange: (seIdx, f) => `updateSectionSet(${sIdx}, ${exIdx}, ${seIdx}, '${f}', this.value)`,
    onSetDel: (seIdx) => `removeSectionSet(${sIdx}, ${exIdx}, ${seIdx})`,
    onAddSet: `addSectionSet(${sIdx}, ${exIdx})`,
  })).join('');
}

// Shared exercise-card renderer used by both classic and dynamic strength lists.
// `handlers` bundles the onclick strings unique to each caller so the card visuals + set-row + rest row stay identical.
function renderExerciseCard(ex, exIdx, allExercises, handlers) {
  const last = findLastHint(ex.name);
  const prev = allExercises[exIdx - 1];
  const next = allExercises[exIdx + 1];
  const groupedWithPrev = ex.group_id && prev && prev.group_id === ex.group_id;
  const groupedWithNext = ex.group_id && next && next.group_id === ex.group_id;
  const isGrouped = groupedWithPrev || groupedWithNext;
  const cardClasses = [
    'exercise-card',
    isGrouped ? 'grouped' : '',
    groupedWithPrev ? 'grouped-not-first' : '',
    groupedWithNext ? 'grouped-not-last' : '',
  ].filter(Boolean).join(' ');
  const groupChip = isGrouped && !groupedWithPrev ? `<div class="superset-chip">≡ Superset</div>` : '';
  return `<div class="${cardClasses}">
    ${groupChip}
    <div class="exercise-head">
      <div class="exercise-name">${escapeHtml(ex.name)}</div>
      <div class="exercise-head-actions">
        <button class="star-toggle ${userPrefs.favorites.has(ex.name) ? 'on' : ''}"
                onclick="toggleFavoriteFromCard(${JSON.stringify(ex.name).replace(/'/g,"\\'")})"
                title="${userPrefs.favorites.has(ex.name) ? 'Unstar' : 'Star this exercise'}">★</button>
        <button class="exercise-menu" onclick="${handlers.onRemove}" title="Remove">remove</button>
      </div>
    </div>
    ${last ? `<div class="last-hint">Last time: <b>${last}</b></div>` : ''}
    <div class="sets-list">
      <div class="sets-header"><div>SET</div><div>REPS</div><div>WEIGHT</div><div></div></div>
      ${ex.sets.map((s, seIdx) => `<div class="set-row">
        <div class="set-num">${seIdx + 1}</div>
        <input type="number" inputmode="numeric" value="${s.reps ?? ''}" placeholder="reps"
               onchange="${handlers.onSetChange(seIdx, 'reps')}" />
        <input type="number" inputmode="decimal" step="2.5" value="${s.weight ?? ''}" placeholder="lbs"
               onchange="${handlers.onSetChange(seIdx, 'weight')}" />
        <button class="set-del" onclick="${handlers.onSetDel(seIdx)}">✕</button>
      </div>`).join('')}
      <button class="add-set-btn" onclick="${handlers.onAddSet}">+ Add Set</button>
    </div>

function updateAmRest(exIdx, val) {

// Shared toggle logic — if the exercise at exIdx is grouped with the one above,
// ungroup it (and clean up the previous if it becomes an orphan). Otherwise, join
// the previous exercise's group (creating one if needed).
function toggleGroupOnArray(arr, exIdx) {
  if (exIdx === 0) return;
  const prev = arr[exIdx - 1];
  const cur = arr[exIdx];
  if (cur.group_id && cur.group_id === prev.group_id) {
    // Currently grouped → ungroup. Also clean up prev if it's now alone.
    const oldGroup = cur.group_id;
    cur.group_id = null;
    const stillUsed = arr.some((e, i) => i !== exIdx && e.group_id === oldGroup);
    if (!stillUsed) prev.group_id = null;
  } else {
    // Not grouped → adopt prev's group_id (or create a new one if prev has none)
    if (!prev.group_id) prev.group_id = 'g_' + Math.random().toString(36).slice(2, 10);
    cur.group_id = prev.group_id;
  }
}

// AUTO-SAVE
// ============================================================
// Flush pending autosaves when the page loses visibility (tab switch, app backgrounded,
// swipe-to-close). Complements the debounced autoSave() that already fires on every input.
function flushSave() {
  if (!currentWorkout) return;
  clearTimeout(saveTimeout);
  autoSave();
}

let saveTimeout = null;
let debounceTimer = null;
// Debounced wrapper — call from oninput handlers so every keystroke schedules
// a save but only the last one in a 400ms burst actually persists.
function autoSaveDebounced() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(autoSave, 400);
}
function autoSave() {
  // Vitals are universal across all templates
  currentWorkout.bodyWeight = parseFloat(document.getElementById('bodyWeight').value) || null;
  currentWorkout.sleep = parseFloat(document.getElementById('sleep').value) || null;
  currentWorkout.energy = parseInt(document.getElementById('energy').value) || null;
  currentWorkout.notes = document.getElementById('dayNotes').value.trim();

  const usingCustomTemplate = currentTemplate && !currentTemplate.is_generic && Array.isArray(currentTemplate.sections);

  if (usingCustomTemplate) {
    // Serialize section state from DOM (mutation helpers already keep exercises/movements in memory)
    currentTemplate.sections.forEach((sec, i) => {
      if (!currentWorkout.sections[i]) currentWorkout.sections[i] = { type: sec.type, state: sectionDefaultState(sec.type) };
      const st = currentWorkout.sections[i].state;
      if (sec.type === 'cardio') {
        st.type = document.getElementById(`sec-${i}-cardio-type`)?.value;
        st.distance = parseFloat(document.getElementById(`sec-${i}-cardio-dist`)?.value) || null;
        st.time = parseFloat(document.getElementById(`sec-${i}-cardio-time`)?.value) || null;
      } else if (sec.type === 'metcon') {
        st.rounds = parseInt(document.getElementById(`sec-${i}-metcon-rounds`)?.value) || null;
        st.time = parseFloat(document.getElementById(`sec-${i}-metcon-time`)?.value) || null;
        st.rpe = parseInt(document.getElementById(`sec-${i}-metcon-rpe`)?.value) || null;
      } else if (sec.type === 'notes' || sec.type === 'custom') {
        st.text = document.getElementById(`sec-${i}-notes`)?.value || '';
      }
    });
  } else {
    // Classic layout: read from the hardcoded IDs
    currentWorkout.cardio = {
      type: document.getElementById('cardioType').value,
      distance: parseFloat(document.getElementById('cardioDist').value) || null,
      time: parseFloat(document.getElementById('cardioTime').value) || null
    };
    currentWorkout.metcon.rounds = parseInt(document.getElementById('metconRounds').value) || null;
    currentWorkout.metcon.time = parseFloat(document.getElementById('metconTime').value) || null;
    currentWorkout.metcon.rpe = parseInt(document.getElementById('metconRPE').value) || null;
  }

  currentWorkout.savedAt = new Date().toISOString();
  if (!isEmpty(currentWorkout)) {
    const idx = state.workouts.findIndex(w => w.date === currentDate);
    if (idx >= 0) state.workouts[idx] = currentWorkout;
    else state.workouts.push(currentWorkout);
    state.workouts.sort((a,b) => b.date.localeCompare(a.date));
  }
  persist();
  showSavePill();
}
function isEmpty(w) {
  if (!w) return true;
  const d = new Date(w.date + 'T12:00:00');
  const autoCat = DAY_TO_CATEGORY[d.getDay()];
  if (w.category && w.category !== autoCat) return false;
  // Classic path
  const classicEmpty = !w.am?.exercises?.length && !w.metcon?.exercises?.length
    && !w.cardio?.time && !w.notes && !w.bodyWeight;
  // Custom sections path
  const sectionsEmpty = !w.sections?.some(s => {
    const st = s?.state || {};
    return st.exercises?.length || st.time || st.rounds || (st.text && st.text.trim());
  });
  return classicEmpty && sectionsEmpty;
}
function showSavePill() {
  const p = document.getElementById('savePill');
  p.classList.add('show');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => p.classList.remove('show'), 1200);
}

// WEEK VIEW
// ============================================================
function shiftWeek(delta) { currentWeekOffset += delta; renderWeek(); }
function getWeekStart(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + (offset * 7)); // Monday
  d.setHours(0,0,0,0);
  return d;
}
function renderWeek() {
  const start = getWeekStart(currentWeekOffset);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  const sameMonth = start.getMonth() === end.getMonth();
  let title;
  if (currentWeekOffset === 0) title = 'This Week';
  else if (currentWeekOffset === -1) title = 'Last Week';
  else if (currentWeekOffset === 1) title = 'Next Week';
  else {
    const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    title = sameMonth ? `${fmt(start)} – ${end.getDate()}` : `${fmt(start)} – ${fmt(end)}`;
  }
  document.getElementById('weekTitle').textContent = title;

  const today = new Date().toISOString().slice(0,10);
  const grid = document.getElementById('weekGrid');
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    const w = state.workouts.find(w => w.date === dateStr);
    const isToday = dateStr === today;
    const cat = w?.category || DAY_TO_CATEGORY[d.getDay()];
    const lifts = w?.am?.exercises?.length || 0;
    const miles = w?.cardio?.distance || 0;
    const movements = w?.metcon?.exercises?.length || 0;
    const isEmpty = lifts === 0 && !miles && movements === 0;
    html += `
      <div class="week-day-card ${isToday ? 'today' : ''} ${isEmpty ? 'empty' : ''}" onclick="jumpToDay('${dateStr}')">
        <div class="row1">
          <div>
            <div class="dayname">${SHORT_DAY_NAMES[d.getDay()]}</div>
            <div class="dnum">${d.getDate()}</div>
          </div>
          <div class="category-mini">${cat}</div>
        </div>
        <div class="summary">
          ${isEmpty ? 'no workout logged' : `
            ${lifts ? `<span><b>${lifts}</b> lifts</span>` : ''}
            ${miles ? `<span><b>${miles}</b>mi</span>` : ''}
            ${movements ? `<span><b>${movements}</b> metcon</span>` : ''}
          `}
        </div>
      </div>
    `;
  }
  grid.innerHTML = html;
}
function jumpToDay(dateStr) {
  setDate(dateStr);
  setView('day');
}

// ============================================================
// MONTH VIEW
// ============================================================
function shiftMonth(delta) { currentMonthOffset += delta; renderMonth(); }
function renderMonth() {
  const now = new Date();
  const monthDate = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const monthName = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  let title;
  if (currentMonthOffset === 0) title = `${monthName.split(' ')[0]} (this month)`;
  else if (currentMonthOffset === -1) title = `${monthName.split(' ')[0]} (last)`;
  else title = monthName;
  document.getElementById('monthTitle').textContent = title;

  // Grid starts on Monday. First-day-of-month → calculate offset
  const firstOfMonth = new Date(year, month, 1);
  const firstDay = firstOfMonth.getDay(); // 0=Sun ... 6=Sat
  const mondayOffset = (firstDay + 6) % 7; // 0 if Mon, 6 if Sun
  const gridStart = new Date(year, month, 1 - mondayOffset);

  // 6 rows × 7 cols = 42 cells
  const today = new Date().toISOString().slice(0, 10);
  const grid = document.getElementById('monthGrid');
  let html = '';
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    const isCurrentMonth = d.getMonth() === month;
    const isToday = dateStr === today;
    const w = state.workouts.find(w => w.date === dateStr);
    const cat = w?.category || (isCurrentMonth ? DAY_TO_CATEGORY[d.getDay()] : '');
    const hasLift = w?.am?.exercises?.length > 0;
    const hasCardio = w?.cardio?.time > 0 || w?.cardio?.distance > 0;
    const hasMetcon = w?.metcon?.exercises?.length > 0;
    const hasAny = hasLift || hasCardio || hasMetcon;

    const classes = ['month-cell'];
    if (!isCurrentMonth) classes.push('other-month');
    if (isToday) classes.push('today');
    if (hasAny && isCurrentMonth) classes.push('has-data');

    html += `<div class="${classes.join(' ')}" onclick="jumpToDay('${dateStr}')">
      <div>
        <div class="month-cell-day">${d.getDate()}</div>
        ${isCurrentMonth && cat ? `<div class="month-cell-cat">${shortCat(cat)}</div>` : ''}
      </div>
      ${hasAny ? `<div class="month-cell-dots">
        ${hasLift ? '<span class="dot dot-lift"></span>' : ''}
        ${hasCardio ? '<span class="dot dot-cardio"></span>' : ''}
        ${hasMetcon ? '<span class="dot dot-metcon"></span>' : ''}
      </div>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
}
function shortCat(cat) {
  return ({ 'Chest/Tri':'Chest', 'Back/Bi':'Back', 'Shoulders':'Shldr', 'Abs':'Abs', 'Legs':'Legs' })[cat] || cat;
}

      ${s.admin_note ? `<div style="margin-top:6px; padding: 6px 8px; background: var(--surface-alt); border-radius: 6px; font-size: 12px; color: var(--text-2);"><strong style="color: var(--text);">Reply:</strong> ${escapeHtml(s.admin_note)}</div>` : ''}
    </div>`;
  }).join('') : `<div style="padding: 20px; text-align:center; color: var(--muted); font-size: 13px; font-style: italic;">No suggestions yet. Submit one below.</div>`;

  body.innerHTML = `
    <div style="padding: 16px 20px; color: var(--text-2); font-size: 13px; line-height: 1.5;">
      Got a feature request, bug report, or idea? Send it in — Tanner reads all of them.
    </div>
    <div style="padding: 0 20px;">
      <textarea id="suggestionText" placeholder="Tell me what would make this better..." style="width: 100%; background: var(--surface); border: 1px solid var(--border-soft); color: var(--text); padding: 12px; border-radius: 10px; min-height: 100px; font-size: 14px; font-family: inherit; line-height: 1.5; resize: vertical;"></textarea>
    </div>
    <div style="padding: 12px 20px;">
      <button id="suggestSubmitBtn" onclick="submitSuggestion()" style="width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;">Send Suggestion</button>
      <div id="suggestErr" style="color: var(--danger,#d05353); font-size: 12px; margin-top: 8px; display:none;"></div>
    </div>
    <div style="padding: 8px 20px 20px;">
      <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 10px;">Your Suggestions</div>
      ${list}
    </div>
  `;
}
async function submitSuggestion() {
  const ta = document.getElementById('suggestionText');
  const btn = document.getElementById('suggestSubmitBtn');
  const err = document.getElementById('suggestErr');
  const text = (ta.value || '').trim();
  if (!text) { err.textContent = 'Type something first.'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const r = await fetch('/api/suggestions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Failed'); }
    ta.value = '';
    await renderSuggestionsModal();
  } catch (e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Send Suggestion';
  }
}

function renderPickerChips() {
  const cat = currentWorkout.category;
  const favCount = userPrefs.favorites.size;
  const starsChip = favCount > 0
    ? `<button class="chip ${pickerFilter==='stars'?'active':''}" onclick="setPF('stars')">★ Stars (${favCount})</button>`
    : '';
  return `<div class="chips">
    <button class="chip ${pickerFilter==='current'?'active':''}" onclick="setPF('current')">${cat}</button>

}
function setPF(f) {
  pickerFilter = f;

  document.getElementById('modalBody').innerHTML = renderPickerList();
}
function renderPickerList() {
  const q = (document.getElementById('modalSearchInput')?.value || '').toLowerCase().trim();
  const cat = currentWorkout.category;
  let groups = [];

  if (pickerFilter === 'stars') {
    // Favorites view — starred exercises grouped by muscle
    const favsByMuscle = {};
    const allGroups = getAllExercisesGroupedByMuscle();
    allGroups.forEach(g => {
      const favs = g.exercises.filter(name => userPrefs.favorites.has(name));
      if (favs.length) favsByMuscle[g.muscle] = { muscle: g.muscle, label: '★ ' + g.label, exercises: favs };
    });
    groups = MUSCLE_ORDER.map(m => favsByMuscle[m]).filter(Boolean);
  } else if (pickerFilter === 'all') {
    groups = getAllExercisesGroupedByMuscle();
  } else {
    // 'current' — muscles mapped to the day category
    groups = getMergedExercisesForCategory(cat);
  }

  let html = '';
  groups.forEach(g => {
    let f = g.exercises.filter(e => !q || e.toLowerCase().includes(q));
    if (pickerFilter !== 'stars') f = f.filter(e => !userPrefs.hidden.has(e));
    f.sort((a, b) => {
      const af = userPrefs.favorites.has(a), bf = userPrefs.favorites.has(b);
      if (af !== bf) return af ? -1 : 1;
      return a.localeCompare(b);
    });
    if (!f.length) return;
    html += `<div class="group-label">${g.label}</div>`;
    html += f.map(n => {
      const isFav = userPrefs.favorites.has(n);
      return `<div class="exercise-pick" onclick="pickerAddExercise(${JSON.stringify(n).replace(/'/g, "\\'")}); closeModal();">
        <div class="name">${isFav ? '<span style="color:var(--gold,#F2B340);margin-right:6px;">★</span>' : ''}${escapeHtml(n)}</div>
        <div class="add-icon">+</div>
      </div>`;
    }).join('');
  });
  if (!html) html = `<div class="empty">No matches for "${escapeHtml(q)}"</div>`;
  return html;
}
function filterPicker() { document.getElementById('modalBody').innerHTML = renderPickerList(); }
// Dispatcher: route picker-selected exercise to classic or section-scoped add

function renderClaudePrompt() {
  const today = new Date().toISOString().slice(0,10);
  const origin = location.origin;
  const prompt = `You are a workout-log parser for my journal at ${origin}. Convert my plain-English workout description into a single clickable save link. NOTHING ELSE.

# CRITICAL RULES — read these carefully, they save time

1. **Do NOT enforce rules on my equipment or exercise choices.** If I say "did curly bar curls" or "bent over barbell rows", log them as-is. I know what I did. Never say "that violates your machine-only rule" — there is no such rule. Do not question my equipment.
2. **Do NOT ask clarifying questions unless a required number is genuinely missing.** If I mention an exercise by an unusual name, use it verbatim (or the closest standard equivalent). Don't ask "did you mean X or Y?".
3. **Do NOT pull data from external sources** (Health app, calendar, etc.). Use ONLY what I typed. If I say "~2 mi in 24 min", log 2 and 24. If I don't provide a number, leave it null.
4. **Output ONLY the summary + link.** No advice, no observations, no "for reference…", no "want me to…". If I need a fix, I'll tell you.

# OUTPUT FORMAT (exactly two things, in this order)

1. One line: what you parsed. E.g. \`Parsed: 4 strength exercises + 2mi run.\`
2. The clickable markdown link:

\`[Save workout](${origin}/import.html#data=URL_ENCODED_JSON)\`

Where URL_ENCODED_JSON is \`encodeURIComponent(JSON.stringify(obj))\` for an object matching the schema below.

Do NOT print the raw JSON. Do NOT explain fields. Do NOT include the object outside the URL.

# JSON SCHEMA

\`\`\`
{
  "date": "YYYY-MM-DD",                              // default today = ${today}
  "category": "string",                              // freeform: "Chest", "Push Day", "Rest", etc. Optional — omit if unclear.
  "bodyWeight": number | null,                       // lbs
  "sleep": number | null,                            // hours
  "energy": number | null,                           // 1-10
  "notes": "string",
  "am": {                                            // strength (any equipment: barbell, DB, machine, cable, BW — YOUR CALL, don't enforce)
    "exercises": [
      { "name": "string", "sets": [{ "reps": number | null, "weight": number | null }] }
    ]
  },
  "cardio": {
    "type": "Run" | "Walk" | "Run/Walk" | "Bike" | "Row" | "Swim" | "Elliptical" | "—",
    "distance": number | null,                       // miles
    "time": number | null                            // minutes
  },
  "metcon": {
    "rounds": number | null,
    "time": number | null,
    "rpe": number | null,                            // 1-10
    "exercises": [{ "name": "string", "reps": number | null }]
  },
  "new_exercises": [                                 // Optional — see EXTENDING THE POOL below
    { "name": "string", "muscle": "chest|back|biceps|triceps|shoulders|quads|hamstrings|calves|abs|full_body" }
  ]
}
\`\`\`

# WHAT HAPPENS ON IMPORT (so you know what your JSON drives)

When I tap the link, the browser opens \`/import.html\` and reads the JSON out of the URL fragment. It then does two things in order:

1. For each entry in \`new_exercises\` (if any), POST to \`/api/custom-exercises\` — adds it to my personal pool so it appears in the picker next time. Duplicates (same name) return 409 and are silently ignored — safe to include a name I already have.
2. PUT the rest of the JSON to \`/api/workouts/{date}\` — creates or overwrites the workout for that date.

Both calls use my logged-in session cookie automatically. You don't need an API key or auth token — you're only building the URL, the browser executes.

# SECTIONS-BASED ALTERNATIVE (advanced, optional)

If I've configured a custom Day Layout on this app (Menu → Day Layouts), my day is composed of an ordered list of sections and the workout data lives at \`data.sections[i].state\`. You almost never need to produce this shape — the legacy \`am\`/\`cardio\`/\`metcon\` shape above always works and the app auto-maps it. But if I explicitly say "use my day-layout shape" or "produce a sections payload", the schema is:

\`\`\`
{
  "date": "YYYY-MM-DD",
  "category": "string",
  "sections": [
    { "type": "strength", "state": { "exercises": [{ "name": "...", "sets": [{ "reps": ..., "weight": ... }] }] } },
    { "type": "cardio",   "state": { "type": "Run", "distance": 2, "time": 22 } },
    { "type": "metcon",   "state": { "rounds": 3, "time": 12, "rpe": 8, "exercises": [{ "name": "...", "reps": ... }] } },
    { "type": "notes",    "state": { "text": "..." } },
    { "type": "custom",   "state": { "text": "..." } }
  ]
}
\`\`\`

Section order matches whatever my Day Layout for that date defines. Only include this if I ask for it by name.

# EXTENDING THE POOL

Any exercise I mention that looks unusual or specific to my gym (e.g. a machine brand name, a novel movement, a personal cue like "biceps blaster" or "the weird cable thing") should be added to my personal exercise pool so it's suggested next time. Include it in the \`new_exercises\` array with the best-guess muscle group. On import, the app POSTs each new entry to my custom-exercises pool before saving the workout.

Rules for \`new_exercises\`:
- Only add exercises YOU introduced (not standard-vocabulary ones like "Bench Press" or "Pull-ups" — those are already in the pool).
- One entry per unique new exercise, even if it appears in multiple sets.
- Pick ONE muscle from: \`chest\`, \`back\`, \`biceps\`, \`triceps\`, \`shoulders\`, \`quads\`, \`hamstrings\`, \`calves\`, \`abs\`, \`full_body\`. Don't invent new groups.
- Omit the array entirely (don't include \`"new_exercises": []\`) if I only used standard exercises.

# RULES ON VALUES

- **Weights in lbs.** Bodyweight (pushups, dips, chinups, scap ups, etc.) → weight is null.
- **"3x10 at 100" means 3 sets, 10 reps each, 100 lbs.** Expand into 3 identical set objects.
- **"3x10-12" means 3 sets of 10 reps each.** Take the lower bound. Don't invent a range.
- **Missing numbers → null.** Never invent. "Did some pushups" → reps: null.
- **Omit sections that weren't done.** Only cardio? Only include \`cardio\`. Only strength? Only \`am\`.
- **Exercise names: use what I said, cleaned up.** "curly bar bicep curls" → "Curly Bar Curl". "bent over rows" → "Bent-Over Barbell Row". "scap ups" → "Scap Ups". Don't rename to something I didn't say.
- **URL: JSON.stringify → encodeURIComponent → interpolate.** No line breaks. Test it decodes back cleanly.

# EXAMPLE

I say:
> Chest press machine 3x10 at 100, incline DB flies 3x12 at 30. Then 3x6 dips and 3x10 scap ups. Ran 2mi in 22 min.

You output:
Parsed: 4 strength exercises + 2mi run.
[Save workout](${origin}/import.html#data=%7B%22date%22%3A%22${today}%22%2C%22am%22%3A%7B%22exercises%22%3A%5B%7B%22name%22%3A%22Machine%20Chest%20Press%22%2C%22sets%22%3A%5B%7B%22reps%22%3A10%2C%22weight%22%3A100%7D%2C%7B%22reps%22%3A10%2C%22weight%22%3A100%7D%2C%7B%22reps%22%3A10%2C%22weight%22%3A100%7D%5D%7D%2C%7B%22name%22%3A%22Incline%20DB%20Fly%22%2C%22sets%22%3A%5B%7B%22reps%22%3A12%2C%22weight%22%3A30%7D%2C%7B%22reps%22%3A12%2C%22weight%22%3A30%7D%2C%7B%22reps%22%3A12%2C%22weight%22%3A30%7D%5D%7D%2C%7B%22name%22%3A%22Parallel%20Bar%20Dips%22%2C%22sets%22%3A%5B%7B%22reps%22%3A6%2C%22weight%22%3Anull%7D%2C%7B%22reps%22%3A6%2C%22weight%22%3Anull%7D%2C%7B%22reps%22%3A6%2C%22weight%22%3Anull%7D%5D%7D%2C%7B%22name%22%3A%22Scap%20Ups%22%2C%22sets%22%3A%5B%7B%22reps%22%3A10%2C%22weight%22%3Anull%7D%2C%7B%22reps%22%3A10%2C%22weight%22%3Anull%7D%2C%7B%22reps%22%3A10%2C%22weight%22%3Anull%7D%5D%7D%5D%7D%2C%22cardio%22%3A%7B%22type%22%3A%22Run%22%2C%22distance%22%3A2%2C%22time%22%3A22%7D%7D)

# HERE IS TODAY'S WORKOUT — parse it and give me the link.
`;

  return `
    <div style="padding: 16px 20px; color: var(--text-2); font-size: 13px; line-height: 1.5;">
      Copy this prompt, paste it into <strong>any AI chatbot</strong> (Claude, ChatGPT, Gemini, Grok, Perplexity — any of them), then describe your workout in plain English. The AI will hand you back a clickable link that saves the workout here.
    </div>
    <div style="padding: 0 20px;">
      <textarea id="claudePromptText" readonly style="width: 100%; background: var(--surface); border: 1px solid var(--border-soft); color: var(--text); padding: 14px; border-radius: 10px; min-height: 320px; font-size: 12px; font-family: ui-monospace, Menlo, monospace; line-height: 1.5; resize: vertical;">${escapeHtml(prompt)}</textarea>
    </div>
    <div style="padding: 12px 20px;">
      <button onclick="copyClaudePrompt()" style="width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;" id="copyBtn">Copy Prompt</button>
    </div>
    <div style="padding: 8px 20px 20px; color: var(--text-2); font-size: 12px; line-height: 1.6;">
      <strong style="color: var(--text); font-size: 13px;">How it works</strong><br>
      1. Tap <strong>Copy Prompt</strong> above.<br>
      2. Open any AI chatbot on your phone (Claude, ChatGPT, Gemini, Grok, whatever you use).<br>
      3. Paste the prompt.<br>
      4. Type or dictate your workout in plain English — e.g. <em>"chest press 3x10 at 100, incline flies 3x12 at 30, ran 2mi in 22min, felt like a 7/10"</em>.<br>
      5. The AI hands back a <strong>Save workout</strong> link. Tap it, review the preview, tap Save.<br><br>
      <strong style="color: var(--text); font-size: 13px;">Why it's nice</strong><br>
      No API key. No integration. Voice-to-text in the AI app gives you fully hands-free logging (talk your workout, tap the link).<br><br>
      <em style="color: var(--muted);">Works because the AI reads the schema in the prompt, builds the URL for you, and the import page decodes it. Your data never touches the AI provider's servers as anything more than a URL string.</em>
    </div>
  `;
}
function copyClaudePrompt() {
  const ta = document.getElementById('claudePromptText');

}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workout-journal-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  closeModal();
}
function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const i = JSON.parse(r.result);
      if (!i.workouts) throw new Error("Missing workouts field");
      if (!confirm(`Import ${i.workouts.length} workouts? This REPLACES current data.`)) return;
      state = i; persist();
      setDate(currentDate); closeModal();
      alert("Imported.");
    } catch(err) { alert("Failed: " + err.message); }
  };
  r.readAsText(file);
}
function clearAll() {
  if (!confirm("Delete ALL workout history? Cannot be undone.")) return;
  if (!confirm("Really? Every workout, gone.")) return;
  state = { workouts: [] }; persist(); setDate(currentDate); closeModal();
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
